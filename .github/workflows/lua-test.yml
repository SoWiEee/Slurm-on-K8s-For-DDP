name: lua-test

# Unit tests for the Slurm Lua submission plugin's standalone helpers:
#   rl_hook.lua       — RL scheduler client (mocks io.popen for curl)
#   submit_helper.lua — R19 sbatch helper (auto --mem / partition / qos)
# Both modules are pure-Lua and require no external services.
#
# score_test.lua is excluded: it requires a rendered chart + running
# controller pod (covered by verify-score-tests.sh on the k3s host).

on:
  push:
    branches: [main]
    paths:
      - 'chart/lua/**'
      - 'tests/lua/rl_hook_test.lua'
      - 'tests/lua/submit_helper_test.lua'
      - '.github/workflows/lua-test.yml'
  pull_request:
    paths:
      - 'chart/lua/**'
      - 'tests/lua/rl_hook_test.lua'
      - 'tests/lua/submit_helper_test.lua'
      - '.github/workflows/lua-test.yml'

jobs:
  lua:
    name: luajit standalone module tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install luajit
        run: sudo apt-get install -y luajit

      - name: Run rl_hook_test.lua
        run: luajit tests/lua/rl_hook_test.lua

      - name: Run submit_helper_test.lua
        run: luajit tests/lua/submit_helper_test.lua
