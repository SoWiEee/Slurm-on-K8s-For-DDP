name: rl-scheduler-test

on:
  push:
    branches: [main]
    paths:
      - 'services/rl_scheduler/**'
      - 'sim/**'
      - '.github/workflows/rl-scheduler-test.yml'
  pull_request:
    paths:
      - 'services/rl_scheduler/**'
      - 'sim/**'
      - '.github/workflows/rl-scheduler-test.yml'

jobs:
  pytest:
    name: pytest rl scheduler tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5

      - name: Run RL scheduler unit tests
        run: |
          uv run \
            --python 3.11 \
            --with "pytest==8.2.2" \
            --with "fastapi==0.115.0" \
            --with "httpx==0.27.2" \
            --with "pydantic==2.9.2" \
            --with "prometheus-client==0.21.0" \
            --with "numpy==1.26.4" \
            pytest services/rl_scheduler/tests/ -v --tb=short
        env:
          PYTHONPATH: .
