name: chart-ci

# Static Helm chart verification:
#   - helm lint (default values + every values-*.yaml overlay)
#   - helm template renders cleanly
#   - helm-unittest under chart/tests/
#   - Negative test: storage.enabled=true without nfsServer must fail
#
# Server-side `kubectl apply --dry-run=server` is intentionally NOT run in
# CI: the chart now uses CRDs shipped by GPU Operator (NFD's NodeFeatureRule
# from R4) and would need a matching cluster fixture, which doesn't match
# the production target (k3s + RTX 4070, see docs/cluster.md). The
# maintainer runs scripts/verify-helm.sh on the real k3s host before
# pushing — that's the authoritative server-side validation.
#
# Skipped: real cluster install + verify-*.sh (those need image builds +
# secrets + NFS, which run on the maintainer's k3s host, not in CI).

on:
  push:
    branches: [main, helm]
    paths:
      - 'chart/**'
      - 'scripts/verify-helm.sh'
      - '.github/workflows/chart-ci.yml'
  pull_request:
    paths:
      - 'chart/**'
      - 'scripts/verify-helm.sh'
      - '.github/workflows/chart-ci.yml'

jobs:
  lint-and-template:
    name: lint + template + unittest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install helm v3.18
        uses: azure/setup-helm@v4
        with:
          # Pinned to v3.18.x: helm-unittest plugin.yaml uses the `platformHooks`
          # field (introduced upstream around plugin v0.7), which only loads on
          # helm >= 3.17. Older helm errors with `unknown field "platformHooks"`.
          version: v3.18.4

      - name: Install helm-unittest plugin
        # Pin plugin version too — keeps CI deterministic across runs and decouples
        # us from upstream releasing a plugin that requires an even newer helm.
        run: helm plugin install https://github.com/helm-unittest/helm-unittest --version 1.0.3

      - name: helm lint (default + overlays)
        run: |
          helm lint chart/
          for ov in chart/values-*.yaml; do
            [[ -f "$ov" ]] && helm lint chart/ -f "$ov"
          done

      - name: helm template (default + overlays)
        run: |
          helm template slurm-platform chart/ -n slurm > /tmp/render-default.yaml
          [[ -s /tmp/render-default.yaml ]] || { echo "default render empty"; exit 1; }
          for ov in chart/values-*.yaml; do
            [[ -f "$ov" ]] || continue
            name=$(basename "$ov" .yaml)
            helm template slurm-platform chart/ -f "$ov" -n slurm \
              > "/tmp/render-${name}.yaml"
            [[ -s "/tmp/render-${name}.yaml" ]] || { echo "$name render empty"; exit 1; }
          done

      - name: helm-unittest (chart/tests/*_test.yaml)
        run: helm unittest chart/

      - name: storage.enabled=true without nfsServer must fail
        run: |
          if helm template slurm-platform chart/ --set storage.enabled=true -n slurm \
              > /tmp/render-bad.yaml 2> /tmp/render-bad.err; then
            echo "FAIL: expected helm template to fail when storage.enabled=true without nfsServer"
            exit 1
          fi
          grep -q 'requires storage.nfsServer to be set' /tmp/render-bad.err
