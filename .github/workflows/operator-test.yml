name: operator-test

# Unit tests for the Slurm operator (fragmentation detector, ghost-job detector).
# OTel deps excluded — operator/otel.py degrades gracefully when OTEL_ENABLED
# is unset (the SDK is optional and not needed for these unit tests).

on:
  push:
    branches: [main]
    paths:
      - 'operator/**'
      - '.github/workflows/operator-test.yml'
  pull_request:
    paths:
      - 'operator/**'
      - '.github/workflows/operator-test.yml'

jobs:
  pytest:
    name: pytest operator tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5

      - name: Run operator tests
        run: |
          uv run \
            --python 3.11 \
            --with "pytest==8.2.2" \
            --with "prometheus-client==0.20.0" \
            --with "kubernetes==30.1.0" \
            pytest operator/tests/ -v --tb=short
        env:
          PYTHONPATH: operator
