name: sim-unit

# Fast unit tests for the discrete-event simulator (no torch, no gymnasium).
# Covers: Job dataclass + trace generators, Cluster MPS model, runner event loop,
# score/fcfs/multifactor schedulers, MetricCollector.

on:
  push:
    branches: [main]
    paths:
      - 'sim/**'
      - '.github/workflows/sim-unit.yml'
  pull_request:
    paths:
      - 'sim/**'
      - '.github/workflows/sim-unit.yml'

jobs:
  pytest:
    name: pytest sim unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5

      - name: Run sim unit tests (exclude torch-dependent tests)
        run: |
          uv run \
            --python 3.11 \
            --with "pytest==8.2.2" \
            --with "numpy==1.26.4" \
            pytest sim/tests/ \
              --ignore=sim/tests/test_dsac_sim_integration.py \
              --ignore=sim/tests/test_gym_env_smoke.py \
              -v --tb=short
        env:
          PYTHONPATH: .
