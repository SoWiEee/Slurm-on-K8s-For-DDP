apiVersion: v2
name: slurm-platform
description: |
  Elastic Slurm-on-Kubernetes platform for distributed AI training (PyTorch DDP).
  Multi-pool autoscaling (CPU, GPU-RTX4070, GPU-RTX4080), checkpoint-aware
  scale-down, dual-subnet DDP networking. Targets Linux + k3s + real GPU
  (production) and Windows + Kind (local development).
type: application
version: 0.1.0
appVersion: "23.11.7"
kubeVersion: ">=1.28.0-0"
home: https://github.com/SoWiEee/Slurm-on-K8s-For-DDP
keywords:
  - slurm
  - hpc
  - ddp
  - pytorch
  - autoscaling
  - mps
maintainers:
  - name: SoWiEee
    email: kawiisowieee@gmail.com
# See docs/note.md §5-A for the full implementation roadmap.
#
# Note: NVIDIA GPU Operator is intentionally NOT a chart dependency. It
# hardcodes Release.Namespace for all its DaemonSets and needs that
# namespace to be PSS=privileged for hostPath access to /dev/nvidia*,
# /run/nvidia/mps, etc. Our slurm namespace is PSS=baseline so the two
# cannot cohabit cleanly. GPU Operator is installed separately via
# `scripts/install-gpu-operator.sh` into its own `gpu-operator` namespace;
# this chart contributes only the device-plugin-config ConfigMap (lives
# in the gpu-operator namespace, picked up by NVIDIA's device-plugin
# DaemonSet) and the node-labeler Job that tags GPU nodes with
# nvidia.com/device-plugin.config=<key>.
