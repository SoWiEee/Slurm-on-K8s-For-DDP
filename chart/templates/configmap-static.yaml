{{/*
slurm-config-static — header section of slurm.conf.

Mounted at /etc/slurm/slurm.conf on every Slurm pod (controller, workers,
login). Changes here roll all Slurm pods; that is intended, because changing
e.g. AuthType or AccountingStorage requires a coordinated restart.

The header ends with `Include /etc/slurm/slurm.nodes.conf`, which Slurm
reads from the slurm-config-nodes ConfigMap mounted at the same directory.
*/}}
apiVersion: v1
kind: ConfigMap
metadata:
  name: slurm-config-static
  namespace: {{ .Values.cluster.namespace }}
  labels:
    {{- include "slurm-platform.labels" . | nindent 4 }}
data:
  slurm.conf: |
{{ include "slurm-platform.slurmConfStatic" . | indent 4 }}
  {{- /*
  cgroup.conf is only emitted when a cgroup-based plugin is in use. Slurm
  23.11's slurmstepd auto-initializes the cgroup plugin if cgroup.conf is
  present (regardless of TaskPlugin), and cgroup/v2 needs dbus+systemd in
  the pod which our PSS=baseline environment does not provide. Guarding by
  proctrackType keeps PSS=baseline pods clean while still letting a
  privileged overlay opt in.
  */}}
  {{- if or (eq .Values.slurm.proctrackType "proctrack/cgroup") (contains "task/cgroup" .Values.slurm.taskPlugin) }}
  cgroup.conf: |
{{ include "slurm-platform.cgroupConf" . | indent 4 }}
  {{- end }}
