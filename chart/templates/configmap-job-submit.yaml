{{/*
slurm-config-job-submit — Lua job_submit plugin.

Mounted at /etc/slurm/job_submit.lua on the controller pod. Loaded by
slurmctld when slurm.conf has `JobSubmitPlugins=lua` (gated by
.Values.slurm.jobSubmit.enabled).

Implements submit-time score factors from
docs/scheduler.md using `job_desc` + chart values:

  f_mps_fit          parses tres_per_node `mps:N`; rewards packing.
  f_vram_fit         parses --constraint vram-XXg; penalises over-prov.
  f_fragmentation    proxy: mps_req·(M-mps_req)/(M/2)² — peaks at 50% req.
  f_topology         reserved field — neutral unless coefficient is non-zero.
  f_pred_runtime     runtime predictor signal — neutral when disabled.

The composite is applied to `job_desc.priority` when scoreApply=true.

Reference: docs/scheduler.md.
*/}}
{{- if .Values.slurm.jobSubmit.enabled }}
{{- $js := .Values.slurm.jobSubmit }}
{{- $w := $js.scoreWeights | default dict }}
{{- $pr := $js.predictor | default dict }}
{{- $rls := .Values.rlScheduler | default dict }}
{{- $rll := $rls.lua | default dict }}
{{- $wt := .Values.weightTuner | default dict }}
{{- $wtl := $wt.lua | default dict }}
{{- $hlp := $js.helper | default dict }}
{{- $hlpMem := $hlp.memory | default dict }}
{{- $hlpPart := $hlp.partition | default dict }}
{{- $hlpQos := $hlp.qos | default dict }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: slurm-config-job-submit
  namespace: {{ .Values.cluster.namespace }}
  labels:
    {{- include "slurm-platform.labels" . | nindent 4 }}
data:
  job_submit.lua: |
    -- ------------------------------------------------------------------
    -- Slurm job_submit plugin.
    -- Generated by chart/templates/configmap-job-submit.yaml.
    -- See docs/scheduler.md for the full spec.
    -- ------------------------------------------------------------------

    local DEBUG_LOG           = {{ if $js.debugLog }}true{{ else }}false{{ end }}
    local DEMO_BOOST_PRIORITY = {{ default 0 $js.demoBoostPriority }}
    local SCORE_GAIN          = {{ default 1000 $js.scoreGain }}
    local SCORE_APPLY         = {{ if $js.scoreApply }}true{{ else }}false{{ end }}
    local MPS_PER_NODE        = {{ default 100 $js.mpsPerNode }}

    -- Coefficients (kept in sync with values.yaml jobSubmit.scoreWeights).
    -- These locals are upvalues: the weight-tuner pull below may
    -- overwrite A, D, E at plugin-load time if weightTuner.lua.enabled=true.
    local A = {{ default 0.40 $w.mpsFit }}        -- α
    local B = {{ default 0.20 $w.vramFit }}       -- β
    local G = {{ default 0.00 $w.topology }}      -- γ
    local D = {{ default 0.20 $w.fragmentation }} -- δ
    local E = {{ default 0.00 $w.predRuntime }}   -- ε

    -- ------------------------------------------------------------------
    -- Weight-tuner: pull (α, δ, ε) from UCB1 bandit at plugin
    -- load time (once per slurmctld start). Failures are silently ignored
    -- so chart-default weights remain in effect. B (vramFit) is not tuned.
    -- ------------------------------------------------------------------
    local WT_ENABLED  = {{ if $wtl.enabled }}true{{ else }}false{{ end }}
    local WT_URL      = {{ default "http://weight-tuner:8003/weights" $wtl.url | quote }}
    local WT_TIMEOUT  = {{ default 0.5 $wtl.timeoutSeconds }}

    if WT_ENABLED then
      pcall(function()
        local cmd = string.format(
          "curl -fsS --max-time %.2f %s 2>/dev/null", WT_TIMEOUT, WT_URL)
        local h = io.popen(cmd, "r")
        if not h then return end
        local body = h:read("*a") or ""
        h:close()
        -- Parse "arm":[α,δ,ε] from JSON (minimal, no deps).
        local arr = string.match(body, '"arm"%s*:%s*%[([^%]]+)%]')
        if not arr then return end
        local vals = {}
        for v in string.gmatch(arr, "%-?%d+%.?%d*") do
          vals[#vals + 1] = tonumber(v)
        end
        if #vals >= 3 then
          A = vals[1]
          D = vals[2]
          E = vals[3]
          if slurm and slurm.log_info then
            slurm.log_info(string.format(
              "[weight-tuner] loaded arm α=%.3f δ=%.3f ε=%.3f", A, D, E))
          end
        end
      end)
    end

    -- VRAM tiers (sorted ascending) — used by f_vram_fit.
    local VRAM_TIERS = {
    {{- range $i, $t := default (list 12 24) $js.vramTiers }}{{ if $i }}, {{ end }}{{ $t }}{{- end }}
    }
    -- Largest tier — used to normalise over-provisioning penalty.
    local VRAM_MAX = VRAM_TIERS[#VRAM_TIERS]

    -- ------------------------------------------------------------------
    -- Predictor — out-of-process call via curl, bounded by
    -- --max-time so a hung service can't stall slurmctld. The whole call
    -- is wrapped in pcall at use site so a parse / shell error degrades
    -- to "no override" rather than failing the sbatch.
    -- ------------------------------------------------------------------
    local PRED_ENABLED          = {{ if $pr.enabled }}true{{ else }}false{{ end }}
    local PRED_URL              = {{ default "http://runtime-predictor:8080/predict" $pr.url | quote }}
    local PRED_TIMEOUT_S        = {{ default 200 $pr.timeoutMs }} / 1000.0
    local PRED_FALLBACK_HOURS   = {{ default 4 $pr.fallbackHours }}
    local PRED_FALLBACK_SECONDS = PRED_FALLBACK_HOURS * 3600
    local PRED_APPLY_TIME_LIMIT = {{ if hasKey $pr "applyTimeLimit" }}{{ if $pr.applyTimeLimit }}true{{ else }}false{{ end }}{{ else }}true{{ end }}
    -- Default GPU-type label sent to the predictor when the job's
    -- features don't carry one. Tunable per-deployment so values-k3s.yaml
    -- (RTX 4070 lab) and the chart's vanilla install (Slurm-only)
    -- emit different gpu_type signals to the model.
    local PRED_DEFAULT_GPU_TYPE = {{ default "rtx4070" $pr.defaultGpuType | quote }}

    -- ------------------------------------------------------------------
    -- Parsing helpers (also exercised by tests/lua/score_test.lua).
    -- ------------------------------------------------------------------

    -- parse_mps_req("gpu:rtx4070:1,mps:25") -> 25
    -- parse_mps_req(nil) -> 0
    function parse_mps_req(tres_per_node)
      if not tres_per_node or tres_per_node == "" then return 0 end
      local n = string.match(tres_per_node, "mps[:=](%d+)")
      return tonumber(n) or 0
    end

    -- parse_vram_req("vram-12g+&cpu") -> 12
    -- parse_vram_req("vram-24g")      -> 24
    -- parse_vram_req(nil)             -> 0
    function parse_vram_req(features)
      if not features or features == "" then return 0 end
      local n = string.match(features, "vram%-(%d+)g")
      return tonumber(n) or 0
    end

    function clamp01(x)
      if x ~= x then return 0 end -- NaN guard
      if x < 0 then return 0 end
      if x > 1 then return 1 end
      return x
    end

    -- ------------------------------------------------------------------
    -- Score factors. All return values in [0, 1]. Pure functions of
    -- job_desc + chart values.
    -- ------------------------------------------------------------------

    -- f_mps_fit: reward packing. mps_req close to MPS_PER_NODE = high
    -- score (whole-node use); mps_req=0 = neutral 1.0 (no MPS request,
    -- no penalty). Spec §3.1.
    function f_mps_fit(job_desc, part_list)
      local mps_req = parse_mps_req(job_desc and job_desc.tres_per_node)
      if mps_req <= 0 then return 1.0 end
      if mps_req > MPS_PER_NODE then return 0.0 end
      return clamp01(mps_req / MPS_PER_NODE)
    end

    -- f_vram_fit: prefer the smallest VRAM tier ≥ requested. Penalty for
    -- over-provisioning is linear in (tier - req)/VRAM_MAX. Spec §3.2.
    function f_vram_fit(job_desc, part_list)
      local req = parse_vram_req(job_desc and job_desc.features)
      if req == 0 then return 0.5 end -- neutral when no constraint
      -- find smallest tier that fits
      local fit_tier = nil
      for _, t in ipairs(VRAM_TIERS) do
        if t >= req then fit_tier = t; break end
      end
      if not fit_tier then return 0.0 end -- no tier large enough
      return clamp01(1 - (fit_tier - req) / VRAM_MAX)
    end

    -- f_fragmentation: parabolic proxy — placing a job that consumes
    -- exactly half a node's MPS leaves the most uneven free-MPS landscape.
    -- mps=0 or mps=MPS_PER_NODE → 0 (no frag); mps=MPS/2 → 1 (worst).
    -- Spec: docs/scheduler.md.
    function f_fragmentation(job_desc, part_list)
      local mps_req = parse_mps_req(job_desc and job_desc.tres_per_node)
      if mps_req <= 0 or mps_req >= MPS_PER_NODE then return 0.0 end
      local x = mps_req / MPS_PER_NODE
      return clamp01(4 * x * (1 - x))
    end

    -- f_topology: reserved. Coefficient default 0 so this stub has
    -- no effect on the composite.
    function f_topology(job_desc, part_list) return 0.5 end

    -- f_pred_runtime: shorter predicted runtime → higher score (SJF-inspired).
    -- Calls call_predictor(); falls back to 0.5 (neutral) on any failure.
    -- Normalised: 1 − pred_s/PRED_FALLBACK_SECONDS, clamped to [0,1].
    -- Only active when PRED_ENABLED=true; otherwise returns 0.5 so ε·0.5
    -- contributes a flat offset (no discrimination).
    function f_pred_runtime(job_desc)
      if not PRED_ENABLED then return 0.5 end
      local ok, success, pred_s = pcall(call_predictor, job_desc)
      if not ok or not success or not pred_s or pred_s <= 0 then return 0.5 end
      return clamp01(1.0 - pred_s / PRED_FALLBACK_SECONDS)
    end

    function compute_score(job_desc, part_list)
      local f_m = f_mps_fit(job_desc, part_list)
      local f_v = f_vram_fit(job_desc, part_list)
      local f_g = f_topology(job_desc, part_list)
      local f_f = f_fragmentation(job_desc, part_list)
      local f_p = f_pred_runtime(job_desc)
      local s = A * f_m + B * f_v + G * f_g - D * f_f + E * f_p
      return clamp01(s), f_m, f_v, f_g, f_f, f_p
    end

    -- ------------------------------------------------------------------
    -- Predictor helpers. Pure functions, exercised by tests/lua/score_test.lua.
    -- ------------------------------------------------------------------

    -- Best-effort GPU-type derivation from --constraint features. Falls
    -- back to PRED_DEFAULT_GPU_TYPE so the predictor always receives a
    -- non-empty alphabet member (the M5 model one-hots over a fixed set
    -- and routes anything unknown to the "other" bucket).
    function predictor_gpu_type(features)
      if not features or features == "" then return PRED_DEFAULT_GPU_TYPE end
      local g = string.match(features, "gpu%-([%w]+)")
      if g and g ~= "" then return g end
      return PRED_DEFAULT_GPU_TYPE
    end

    -- Manual JSON encoder — controller image carries lua5.1 with no
    -- cjson, and the request payload is small enough that a string.format
    -- is both safer (escaped " and \) and dependency-free.
    function build_predict_body(job_desc)
      local function esc(s)
        s = tostring(s or "")
        s = string.gsub(s, "\\", "\\\\")
        s = string.gsub(s, '"',  '\\"')
        return s
      end
      local user      = esc((job_desc and job_desc.user_name) or "anon")
      local partition = esc((job_desc and job_desc.partition) or "gpu")
      local features  = (job_desc and job_desc.features) or ""
      local gpu_type  = esc(predictor_gpu_type(features))
      local gpu_count = tonumber((job_desc and job_desc.min_nodes) or 1) or 1
      local mps       = parse_mps_req(job_desc and job_desc.tres_per_node)
      if mps == 0 then mps = 4 end -- whole-GPU when not specified
      -- Slurm time_limit is in MINUTES; convert to seconds for the predictor.
      local user_tlim_min = tonumber((job_desc and job_desc.time_limit) or 0) or 0
      if user_tlim_min < 0 then user_tlim_min = 0 end
      return string.format(
        '{"user":"%s","partition":"%s","gpu_count":%d,"mps_req":%d,"gpu_type":"%s","user_time_limit_seconds":%d}',
        user, partition, gpu_count, mps, gpu_type, user_tlim_min * 60)
    end

    -- Single-shot regex over the JSON response — avoid a full parser to
    -- keep the plugin stdlib-only. Returns nil on missing field.
    function parse_predict_response(text)
      if not text or text == "" then return nil end
      local s = string.match(text, '"pred_seconds"%s*:%s*([%-%d%.eE]+)')
      if not s then return nil end
      return tonumber(s)
    end

    -- Wraps the curl invocation. Returns (ok, pred_seconds, err).
    -- ok=false implies the caller should NOT mutate job_desc; we still
    -- return any text the caller might want to log.
    function call_predictor(job_desc)
      if not PRED_ENABLED then return false, nil, "disabled" end
      local body = build_predict_body(job_desc)
      -- Single-quoted shell with embedded single-quote escape.
      local body_q = "'" .. string.gsub(body, "'", "'\\''") .. "'"
      local cmd = string.format(
        "curl -fsS --max-time %.3f -X POST -H 'Content-Type: application/json' -d %s %q 2>/dev/null",
        PRED_TIMEOUT_S, body_q, PRED_URL)
      local fh = io.popen(cmd, "r")
      if not fh then return false, nil, "popen-failed" end
      local resp = fh:read("*a") or ""
      fh:close()
      local pred = parse_predict_response(resp)
      if not pred or pred <= 0 then return false, nil, "no-prediction" end
      return true, pred, nil
    end

    -- Applies pred_seconds → job_desc.time_limit (minutes) when:
    --   - predictor enabled and applyTimeLimit=true
    --   - user did not set --time, or set it to a value > 2× prediction
    -- Returns (applied, pred_minutes, reason).
    function maybe_apply_predicted_time_limit(job_desc)
      if not (PRED_ENABLED and PRED_APPLY_TIME_LIMIT) then
        return false, nil, "apply-disabled"
      end
      -- pcall(f, ...) returns (true, f's returns…) on success, or
      -- (false, errmsg) on a Lua error. call_predictor returns 3 values.
      local ok, success, pred_seconds, reason = pcall(call_predictor, job_desc)
      if not ok then return false, nil, "lua-error" end
      if not success or not pred_seconds or pred_seconds <= 0 then
        return false, nil, reason or "predictor-unavailable"
      end
      local pred_min = math.ceil(pred_seconds / 60)
      local fallback_min = math.floor(PRED_FALLBACK_SECONDS / 60)
      if pred_min > fallback_min then pred_min = fallback_min end
      if pred_min < 1 then pred_min = 1 end
      local user_min = tonumber((job_desc and job_desc.time_limit) or 0) or 0
      if user_min > 0 and user_min < pred_min * 2 then
        return false, pred_min, "user-time-tighter"
      end
      job_desc.time_limit = pred_min
      return true, pred_min, "applied"
    end

    -- ------------------------------------------------------------------
    -- R19 (v5 review) — submit helper. Auto-completes --mem / --partition
    -- / --qos when the user didn't set them. Each helper silently no-ops
    -- when disabled or when job_desc already carries a user-provided
    -- value, so this never overrides explicit user intent.
    -- ------------------------------------------------------------------
    local HLP_ENABLED       = {{ if $hlp.enabled }}true{{ else }}false{{ end }}

    local HLP_MEM_ENABLED   = {{ if $hlpMem.enabled }}true{{ else }}false{{ end }}
    local HLP_MEM_PER_GPU   = {{ default 4096 $hlpMem.memPerGpuMB }}
    local HLP_MEM_PER_CPU   = {{ default 256  $hlpMem.memPerCpuMB }}
    local HLP_MEM_MIN       = {{ default 1024 $hlpMem.minMemoryMB }}
    local HLP_MEM_MAX       = {{ default 65536 $hlpMem.maxMemoryMB }}

    local HLP_PART_ENABLED  = {{ if $hlpPart.enabled }}true{{ else }}false{{ end }}
    local HLP_PART_FALLBACK = {{ default "cpu" $hlpPart.fallback | quote }}
    local HLP_PART_RULES    = {
    {{- range $i, $r := default (list) $hlpPart.rules }}
      { gres = {{ $r.gres | quote }}, partition = {{ $r.partition | quote }} }{{ if lt (add1 $i) (len $hlpPart.rules) }},{{ end }}
    {{- end }}
    }

    local HLP_QOS_ENABLED   = {{ if $hlpQos.enabled }}true{{ else }}false{{ end }}
    local HLP_QOS_DEFAULT   = {{ default "" $hlpQos.default | quote }}
    local HLP_QOS_RULES     = {
    {{- range $i, $r := default (list) $hlpQos.rules }}
      { account = {{ $r.account | quote }}, qos = {{ $r.qos | quote }} }{{ if lt (add1 $i) (len $hlpQos.rules) }},{{ end }}
    {{- end }}
    }

{{ .Files.Get "lua/submit_helper.lua" | indent 4 }}

    -- ------------------------------------------------------------------
    -- RL scheduler hook. SHADOW_MODE on the serve side
    -- means /decide never returns a non-zero boost; we still call it so
    -- that the live cluster emits decision events for offline analysis.
    -- ------------------------------------------------------------------
    RL_ENABLED   = {{ if $rll.enabled }}true{{ else }}false{{ end }}
    RL_URL       = {{ default "http://rl-scheduler:8002/decide" $rll.url | quote }}
    RL_TIMEOUT_S = {{ default 0.15 $rll.timeoutSeconds }}

{{ .Files.Get "lua/rl_hook.lua" | indent 4 }}

    -- ------------------------------------------------------------------
    -- Slurm hooks. log_summary / slurm_job_submit / slurm_job_modify.
    -- The `slurm` global is provided by slurmctld; tests stub it out.
    -- ------------------------------------------------------------------

    local function log_info(msg)
      if slurm and slurm.log_info then slurm.log_info(msg) end
    end

    local function log_summary(prefix, job_desc)
      if not DEBUG_LOG then return end
      log_info(string.format(
        "[score] %s name=%s partition=%s tres_per_node=%s features=%s",
        prefix,
        tostring((job_desc and job_desc.name) or ""),
        tostring((job_desc and job_desc.partition) or ""),
        tostring((job_desc and job_desc.tres_per_node) or ""),
        tostring((job_desc and job_desc.features) or "")
      ))
    end

    function slurm_job_submit(job_desc, part_list, submit_uid)
      log_summary("submit", job_desc)

      -- R19 — submit helper runs FIRST so subsequent steps (score factors,
      -- predictor, RL) see fully populated job_desc fields. Each helper
      -- is a no-op if the user already set the field, so this never
      -- overrides explicit user intent.
      pcall(apply_submit_helpers, job_desc)

      -- Demo path (kept from M2 for plumbing tests).
      if DEMO_BOOST_PRIORITY > 0
         and job_desc.name
         and string.sub(job_desc.name, 1, 11) == "score-demo-" then
        job_desc.priority = DEMO_BOOST_PRIORITY
        log_info(string.format(
          "[score] demo-boost name=%s priority=%d",
          job_desc.name, DEMO_BOOST_PRIORITY))
        return slurm.SUCCESS
      end

      local s, f_m, f_v, f_g, f_f, f_p = compute_score(job_desc, part_list)
      local delta = math.floor(SCORE_GAIN * s + 0.5)
      log_info(string.format(
        "[score] score=%.4f delta=%d mps_fit=%.2f vram_fit=%.2f topo=%.2f frag=%.2f pred=%.2f apply=%s",
        s, delta, f_m, f_v, f_g, f_f, f_p, tostring(SCORE_APPLY)))

      -- Out-of-process runtime prediction.
      if PRED_ENABLED then
        local applied, pred_min, reason = maybe_apply_predicted_time_limit(job_desc)
        if applied then
          log_info(string.format(
            "[predictor] applied predicted time_limit=%d min (was=%s)",
            pred_min, tostring(job_desc and job_desc._user_time_limit or "n/a")))
        else
          log_info(string.format(
            "[predictor] skipped (%s, pred_min=%s)",
            tostring(reason), tostring(pred_min)))
        end
      end

      if SCORE_APPLY and delta > 0 then
        -- Slurm overlays multifactor priority on top of any explicit
        -- value we set; treating delta as an additive nudge keeps fairshare
        -- + age + qos in charge of inter-job ordering and lets score act
        -- as a tiebreaker. The simplest hook is to set priority directly
        -- when no priority has been assigned yet (held / new submissions);
        -- M8 may revisit this once we have evaluation data.
        if not job_desc.priority or job_desc.priority == 0 then
          job_desc.priority = delta
        end
      end

      -- RL scheduler shadow/live decision. rl_apply
      -- safely no-ops on every failure path (disabled, network, parse
      -- error, lua error inside pcall), so this never blocks sbatch.
      if RL_ENABLED then
        local mps_req   = parse_mps_req(job_desc and job_desc.tres_per_node)
        local gpu_count = tonumber((job_desc and job_desc.min_nodes) or 1) or 1
        local runtime_s = (tonumber((job_desc and job_desc.time_limit) or 0) or 0) * 60
        rl_apply(job_desc, mps_req, gpu_count, runtime_s)
      end

      return slurm.SUCCESS
    end

    function slurm_job_modify(job_desc, job_rec, part_list, modify_uid)
      log_summary("modify", job_desc)
      return slurm.SUCCESS
    end

    log_info("[score] job_submit.lua loaded (apply=" ..
      tostring(SCORE_APPLY) .. ", weights α=" .. A .. " β=" .. B ..
      " γ=" .. G .. " δ=" .. D .. " ε=" .. E .. ")")

    return slurm.SUCCESS
{{- end }}
