{{/*
slurm-config-job-submit — Lua job_submit plugin (Phase 6 M2 scaffold).

Mounted at /etc/slurm/job_submit.lua on the controller pod. Loaded by
slurmctld when slurm.conf has `JobSubmitPlugins=lua` (gated by
.Values.slurm.jobSubmit.enabled).

The shipped scaffold only:
  1. Logs job_desc fields (name, partition, num_tasks, tres_per_node,
     features, time_limit) at slurm.log_info level when debugLog=true.
  2. If demoBoostPriority > 0 AND job name starts with "score-demo-",
     sets job_desc.priority to demoBoostPriority — used by the M2 live
     test to verify the plugin can write back to job_desc.
  3. Defines empty stubs for f_mps_fit / f_vram_fit / f_topology /
     f_fragmentation / f_pred_runtime — M3+ fills these in.

Reference: docs/scheduler-score-spec.md.
*/}}
{{- if .Values.slurm.jobSubmit.enabled }}
{{- $js := .Values.slurm.jobSubmit }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: slurm-config-job-submit
  namespace: {{ .Values.cluster.namespace }}
  labels:
    {{- include "slurm-platform.labels" . | nindent 4 }}
data:
  job_submit.lua: |
    -- ------------------------------------------------------------------
    -- Slurm job_submit plugin — Phase 6 M2 scaffold.
    -- Generated by chart/templates/configmap-job-submit.yaml.
    -- See docs/scheduler-score-spec.md for the full spec.
    -- ------------------------------------------------------------------

    local DEBUG_LOG          = {{ if $js.debugLog }}true{{ else }}false{{ end }}
    local DEMO_BOOST_PRIORITY = {{ default 0 $js.demoBoostPriority }}
    local SCORE_GAIN         = {{ default 1000 $js.scoreGain }}

    -- Score factor stubs. M3 replaces each `return 0.5` with a real
    -- computation (see docs/scheduler-score-spec.md §3).

    local function f_mps_fit(job_desc, part_list)        return 0.5 end
    local function f_vram_fit(job_desc, part_list)       return 0.5 end
    local function f_topology(job_desc, part_list)       return 0.5 end
    local function f_fragmentation(job_desc, part_list)  return 0.5 end
    local function f_pred_runtime(job_desc)              return 0.5 end

    -- Default coefficients (kept in sync with values.yaml when M3
    -- moves them into chart values).
    local A, B, G, D, E = 0.40, 0.20, 0.15, 0.20, 0.05

    local function compute_score(job_desc, part_list)
      local s = A * f_mps_fit(job_desc, part_list)
              + B * f_vram_fit(job_desc, part_list)
              + G * f_topology(job_desc, part_list)
              - D * f_fragmentation(job_desc, part_list)
              + E * f_pred_runtime(job_desc)
      if s < 0 then s = 0 end
      if s > 1 then s = 1 end
      return s
    end

    local function log_summary(prefix, job_desc)
      if not DEBUG_LOG then return end
      slurm.log_info(string.format(
        "[score-m2] %s name=%s partition=%s num_tasks=%s min_nodes=%s tres_per_node=%s features=%s time_limit=%s",
        prefix,
        tostring(job_desc.name or ""),
        tostring(job_desc.partition or ""),
        tostring(job_desc.num_tasks or ""),
        tostring(job_desc.min_nodes or ""),
        tostring(job_desc.tres_per_node or ""),
        tostring(job_desc.features or ""),
        tostring(job_desc.time_limit or "")
      ))
    end

    function slurm_job_submit(job_desc, part_list, submit_uid)
      log_summary("submit", job_desc)

      -- M2 demo: prove we can write back to job_desc.
      if DEMO_BOOST_PRIORITY > 0
         and job_desc.name
         and string.sub(job_desc.name, 1, 11) == "score-demo-" then
        job_desc.priority = DEMO_BOOST_PRIORITY
        slurm.log_info(string.format(
          "[score-m2] demo-boost name=%s priority=%d",
          job_desc.name, DEMO_BOOST_PRIORITY))
      end

      -- M3+ will use compute_score(...) here. Currently shadow-only:
      -- evaluate but do not apply, so we can confirm the plumbing works.
      local s = compute_score(job_desc, part_list)
      if DEBUG_LOG then
        slurm.log_info(string.format(
          "[score-m2] shadow_score=%.4f gain=%d (not applied in M2)",
          s, SCORE_GAIN))
      end

      return slurm.SUCCESS
    end

    function slurm_job_modify(job_desc, job_rec, part_list, modify_uid)
      log_summary("modify", job_desc)
      return slurm.SUCCESS
    end

    slurm.log_info("[score-m2] job_submit.lua loaded (debugLog=" ..
      tostring(DEBUG_LOG) .. ", demoBoost=" ..
      tostring(DEMO_BOOST_PRIORITY) .. ")")

    return slurm.SUCCESS
{{- end }}
