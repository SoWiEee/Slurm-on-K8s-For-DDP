{{/*
slurm-config-job-submit — Lua job_submit plugin (Phase 6 M3).

Mounted at /etc/slurm/job_submit.lua on the controller pod. Loaded by
slurmctld when slurm.conf has `JobSubmitPlugins=lua` (gated by
.Values.slurm.jobSubmit.enabled).

M3 implements the first three score factors from
docs/scheduler-score-spec.md §3 using only `job_desc` + chart values
(no live cluster state — that arrives with M7's fragmentation detector):

  f_mps_fit          parses tres_per_node `mps:N`; rewards packing.
  f_vram_fit         parses --constraint vram-XXg; penalises over-prov.
  f_fragmentation    proxy: mps_req·(M-mps_req)/(M/2)² — peaks at 50% req.
  f_topology         M7 stub — returns 0.5 unless coefficient = 0.
  f_pred_runtime     M5+M6 stub — returns 0.5 unless coefficient = 0.

The composite is applied to `job_desc.priority` when scoreApply=true.

Reference: docs/scheduler-score-spec.md.
*/}}
{{- if .Values.slurm.jobSubmit.enabled }}
{{- $js := .Values.slurm.jobSubmit }}
{{- $w := $js.scoreWeights | default dict }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: slurm-config-job-submit
  namespace: {{ .Values.cluster.namespace }}
  labels:
    {{- include "slurm-platform.labels" . | nindent 4 }}
data:
  job_submit.lua: |
    -- ------------------------------------------------------------------
    -- Slurm job_submit plugin — Phase 6 M3.
    -- Generated by chart/templates/configmap-job-submit.yaml.
    -- See docs/scheduler-score-spec.md for the full spec.
    -- ------------------------------------------------------------------

    local DEBUG_LOG           = {{ if $js.debugLog }}true{{ else }}false{{ end }}
    local DEMO_BOOST_PRIORITY = {{ default 0 $js.demoBoostPriority }}
    local SCORE_GAIN          = {{ default 1000 $js.scoreGain }}
    local SCORE_APPLY         = {{ if $js.scoreApply }}true{{ else }}false{{ end }}
    local MPS_PER_NODE        = {{ default 100 $js.mpsPerNode }}

    -- Coefficients (kept in sync with values.yaml jobSubmit.scoreWeights).
    local A = {{ default 0.40 $w.mpsFit }}        -- α
    local B = {{ default 0.20 $w.vramFit }}       -- β
    local G = {{ default 0.00 $w.topology }}      -- γ
    local D = {{ default 0.20 $w.fragmentation }} -- δ
    local E = {{ default 0.00 $w.predRuntime }}   -- ε

    -- VRAM tiers (sorted ascending) — used by f_vram_fit.
    local VRAM_TIERS = {
    {{- range $i, $t := default (list 12 24) $js.vramTiers }}{{ if $i }}, {{ end }}{{ $t }}{{- end }}
    }
    -- Largest tier — used to normalise over-provisioning penalty.
    local VRAM_MAX = VRAM_TIERS[#VRAM_TIERS]

    -- ------------------------------------------------------------------
    -- Parsing helpers (also exercised by tests/lua/score_test.lua).
    -- ------------------------------------------------------------------

    -- parse_mps_req("gpu:rtx4070:1,mps:25") -> 25
    -- parse_mps_req(nil) -> 0
    function parse_mps_req(tres_per_node)
      if not tres_per_node or tres_per_node == "" then return 0 end
      local n = string.match(tres_per_node, "mps[:=](%d+)")
      return tonumber(n) or 0
    end

    -- parse_vram_req("vram-12g+&cpu") -> 12
    -- parse_vram_req("vram-24g")      -> 24
    -- parse_vram_req(nil)             -> 0
    function parse_vram_req(features)
      if not features or features == "" then return 0 end
      local n = string.match(features, "vram%-(%d+)g")
      return tonumber(n) or 0
    end

    function clamp01(x)
      if x ~= x then return 0 end -- NaN guard
      if x < 0 then return 0 end
      if x > 1 then return 1 end
      return x
    end

    -- ------------------------------------------------------------------
    -- Score factors. All return values in [0, 1]. Pure functions of
    -- job_desc + chart values — no live cluster state in M3.
    -- ------------------------------------------------------------------

    -- f_mps_fit: reward packing. mps_req close to MPS_PER_NODE = high
    -- score (whole-node use); mps_req=0 = neutral 1.0 (no MPS request,
    -- no penalty). Spec §3.1.
    function f_mps_fit(job_desc, part_list)
      local mps_req = parse_mps_req(job_desc and job_desc.tres_per_node)
      if mps_req <= 0 then return 1.0 end
      if mps_req > MPS_PER_NODE then return 0.0 end
      return clamp01(mps_req / MPS_PER_NODE)
    end

    -- f_vram_fit: prefer the smallest VRAM tier ≥ requested. Penalty for
    -- over-provisioning is linear in (tier - req)/VRAM_MAX. Spec §3.2.
    function f_vram_fit(job_desc, part_list)
      local req = parse_vram_req(job_desc and job_desc.features)
      if req == 0 then return 0.5 end -- neutral when no constraint
      -- find smallest tier that fits
      local fit_tier = nil
      for _, t in ipairs(VRAM_TIERS) do
        if t >= req then fit_tier = t; break end
      end
      if not fit_tier then return 0.0 end -- no tier large enough
      return clamp01(1 - (fit_tier - req) / VRAM_MAX)
    end

    -- f_fragmentation: parabolic proxy — placing a job that consumes
    -- exactly half a node's MPS leaves the most uneven free-MPS landscape.
    -- mps=0 or mps=MPS_PER_NODE → 0 (no frag); mps=MPS/2 → 1 (worst).
    -- Real stddev-over-cluster lands in M7 once the operator publishes a
    -- live state file. Spec §3.4.
    function f_fragmentation(job_desc, part_list)
      local mps_req = parse_mps_req(job_desc and job_desc.tres_per_node)
      if mps_req <= 0 or mps_req >= MPS_PER_NODE then return 0.0 end
      local x = mps_req / MPS_PER_NODE
      return clamp01(4 * x * (1 - x))
    end

    -- f_topology: deferred to M7. Coefficient default 0 so this stub has
    -- no effect on the composite.
    function f_topology(job_desc, part_list) return 0.5 end

    -- f_pred_runtime: deferred to M5+M6. Same idea — coefficient 0.
    function f_pred_runtime(job_desc) return 0.5 end

    function compute_score(job_desc, part_list)
      local f_m = f_mps_fit(job_desc, part_list)
      local f_v = f_vram_fit(job_desc, part_list)
      local f_g = f_topology(job_desc, part_list)
      local f_f = f_fragmentation(job_desc, part_list)
      local f_p = f_pred_runtime(job_desc)
      local s = A * f_m + B * f_v + G * f_g - D * f_f + E * f_p
      return clamp01(s), f_m, f_v, f_g, f_f, f_p
    end

    -- ------------------------------------------------------------------
    -- Slurm hooks. log_summary / slurm_job_submit / slurm_job_modify.
    -- The `slurm` global is provided by slurmctld; tests stub it out.
    -- ------------------------------------------------------------------

    local function log_info(msg)
      if slurm and slurm.log_info then slurm.log_info(msg) end
    end

    local function log_summary(prefix, job_desc)
      if not DEBUG_LOG then return end
      log_info(string.format(
        "[score-m3] %s name=%s partition=%s tres_per_node=%s features=%s",
        prefix,
        tostring((job_desc and job_desc.name) or ""),
        tostring((job_desc and job_desc.partition) or ""),
        tostring((job_desc and job_desc.tres_per_node) or ""),
        tostring((job_desc and job_desc.features) or "")
      ))
    end

    function slurm_job_submit(job_desc, part_list, submit_uid)
      log_summary("submit", job_desc)

      -- Demo path (kept from M2 for plumbing tests).
      if DEMO_BOOST_PRIORITY > 0
         and job_desc.name
         and string.sub(job_desc.name, 1, 11) == "score-demo-" then
        job_desc.priority = DEMO_BOOST_PRIORITY
        log_info(string.format(
          "[score-m3] demo-boost name=%s priority=%d",
          job_desc.name, DEMO_BOOST_PRIORITY))
        return slurm.SUCCESS
      end

      local s, f_m, f_v, f_g, f_f, f_p = compute_score(job_desc, part_list)
      local delta = math.floor(SCORE_GAIN * s + 0.5)
      log_info(string.format(
        "[score-m3] score=%.4f delta=%d mps_fit=%.2f vram_fit=%.2f topo=%.2f frag=%.2f pred=%.2f apply=%s",
        s, delta, f_m, f_v, f_g, f_f, f_p, tostring(SCORE_APPLY)))

      if SCORE_APPLY and delta > 0 then
        -- Slurm overlays multifactor priority on top of any explicit
        -- value we set; treating delta as an additive nudge keeps fairshare
        -- + age + qos in charge of inter-job ordering and lets score act
        -- as a tiebreaker. The simplest hook is to set priority directly
        -- when no priority has been assigned yet (held / new submissions);
        -- M8 may revisit this once we have evaluation data.
        if not job_desc.priority or job_desc.priority == 0 then
          job_desc.priority = delta
        end
      end

      return slurm.SUCCESS
    end

    function slurm_job_modify(job_desc, job_rec, part_list, modify_uid)
      log_summary("modify", job_desc)
      return slurm.SUCCESS
    end

    log_info("[score-m3] job_submit.lua loaded (apply=" ..
      tostring(SCORE_APPLY) .. ", weights α=" .. A .. " β=" .. B ..
      " γ=" .. G .. " δ=" .. D .. " ε=" .. E .. ")")

    return slurm.SUCCESS
{{- end }}
