{{- if .Values.networkPolicy.enabled -}}
{{/*
NetworkPolicy bundle for the slurm namespace. Strategy:

  Ingress — default-deny all, then whitelist documented communication paths.
  Egress  — default-deny all, then whitelist only what each pod type needs:
              • DNS (kube-dns UDP/TCP 53) — all pods
              • operator  → K8s API + controller slurmrestd
              • controller→ workers (slurmd/SSH) + login (SSH) + slurmdbd
              • workers   → controller (any port) + inter-worker (any port)
                            + login (any port) + NFS (TCP 2049)
              • login     → controller (any port) + workers (slurmd/SSH) + NFS

Worker app labels are templated from .Values.pools so adding/removing a
pool stays in sync without manual NetworkPolicy edits.

apiServerPorts: 443 covers Kind / hosted K8s; 6443 covers k3s default.
Both are listed so the same chart values render correctly on either runtime.
*/}}
{{- $ns := .Values.cluster.namespace -}}
{{- $workerLabels := list -}}
{{- range .Values.pools }}{{- $workerLabels = append $workerLabels .appLabel }}{{- end }}
{{- $workerAndLogin := append $workerLabels "slurm-login" }}
{{- $apiPorts := .Values.networkPolicy.apiServerPorts -}}
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-ingress
  namespace: {{ $ns }}
  labels:
    {{- include "slurm-platform.labels" . | nindent 4 }}
spec:
  podSelector: {}
  policyTypes: [Ingress]
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-egress
  namespace: {{ $ns }}
  labels:
    {{- include "slurm-platform.labels" . | nindent 4 }}
spec:
  podSelector: {}
  policyTypes: [Egress]
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-dns-egress
  namespace: {{ $ns }}
  labels:
    {{- include "slurm-platform.labels" . | nindent 4 }}
spec:
  podSelector: {}
  policyTypes: [Egress]
  egress:
    - ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-controller-ingress
  namespace: {{ $ns }}
  labels:
    {{- include "slurm-platform.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      app: slurm-controller
  policyTypes: [Ingress]
  ingress:
    - from:
        - podSelector:
            matchExpressions:
              - key: app
                operator: In
                values:
                  {{- range $workerAndLogin }}
                  - {{ . }}
                  {{- end }}
                  - slurm-elastic-operator
                  - slurm-exporter
      ports:
        - protocol: TCP
          port: 6817   # slurmctld
        - protocol: TCP
          port: 6820   # slurmrestd
        - protocol: TCP
          port: 22     # SSH
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-worker-ingress
  namespace: {{ $ns }}
  labels:
    {{- include "slurm-platform.labels" . | nindent 4 }}
spec:
  podSelector:
    matchExpressions:
      - key: app
        operator: In
        values:
          {{- range $workerLabels }}
          - {{ . }}
          {{- end }}
  policyTypes: [Ingress]
  ingress:
    # Step launch / SSH from controller, login, and other workers (MPI/DDP)
    - from:
        - podSelector:
            matchExpressions:
              - key: app
                operator: In
                values:
                  - slurm-controller
                  - slurm-login
                  {{- range $workerLabels }}
                  - {{ . }}
                  {{- end }}
      ports:
        - protocol: TCP
          port: 6818   # slurmd
        - protocol: TCP
          port: 22     # SSH
    # Inter-worker MPI on ephemeral high ports (NCCL/Gloo)
    - from:
        - podSelector:
            matchExpressions:
              - key: app
                operator: In
                values:
                  {{- range $workerLabels }}
                  - {{ . }}
                  {{- end }}
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-login-ingress
  namespace: {{ $ns }}
  labels:
    {{- include "slurm-platform.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      app: slurm-login
  policyTypes: [Ingress]
  ingress:
    # ALL ports from workers — srun step I/O callback on ephemeral ports.
    # Restricting to port 22 only would cause "step aborted before launch".
    - from:
        - podSelector:
            matchExpressions:
              - key: app
                operator: In
                values:
                  {{- range $workerLabels }}
                  - {{ . }}
                  {{- end }}
    # SSH from controller
    - from:
        - podSelector:
            matchLabels:
              app: slurm-controller
      ports:
        - protocol: TCP
          port: 22
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-operator-egress
  namespace: {{ $ns }}
  labels:
    {{- include "slurm-platform.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      app: slurm-elastic-operator
  policyTypes: [Egress]
  egress:
    # K8s API server — ClusterIP in default namespace, allow HTTPS to anywhere.
    # 443 covers Kind / hosted K8s; 6443 covers k3s default.
    - ports:
        {{- range $apiPorts }}
        - protocol: TCP
          port: {{ . }}
        {{- end }}
    # slurmrestd on the controller pod (HTTP, via slurm-restapi ClusterIP)
    - to:
        - podSelector:
            matchLabels:
              app: slurm-controller
      ports:
        - protocol: TCP
          port: 6820
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-controller-egress
  namespace: {{ $ns }}
  labels:
    {{- include "slurm-platform.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      app: slurm-controller
  policyTypes: [Egress]
  egress:
    # slurmd + SSH on workers (step launch, job I/O)
    - to:
        - podSelector:
            matchExpressions:
              - key: app
                operator: In
                values:
                  {{- range $workerLabels }}
                  - {{ . }}
                  {{- end }}
      ports:
        - protocol: TCP
          port: 6818
        - protocol: TCP
          port: 22
    # SSH to login (srun interactive sessions)
    - to:
        - podSelector:
            matchLabels:
              app: slurm-login
      ports:
        - protocol: TCP
          port: 22
    # slurmdbd accounting (TCP {{ .Values.slurm.accounting.storagePort }})
    - to:
        - podSelector:
            matchLabels:
              app: slurmdbd
      ports:
        - protocol: TCP
          port: {{ .Values.slurm.accounting.storagePort }}
    # NFS server for /shared RWX volume
    - ports:
        - protocol: TCP
          port: 2049
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-slurmdbd-egress
  namespace: {{ $ns }}
  labels:
    {{- include "slurm-platform.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      app: slurmdbd
  policyTypes: [Egress]
  egress:
    - to:
        - podSelector:
            matchLabels:
              app: mysql
      ports:
        - protocol: TCP
          port: 3306
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-worker-egress
  namespace: {{ $ns }}
  labels:
    {{- include "slurm-platform.labels" . | nindent 4 }}
spec:
  podSelector:
    matchExpressions:
      - key: app
        operator: In
        values:
          {{- range $workerLabels }}
          - {{ . }}
          {{- end }}
  policyTypes: [Egress]
  egress:
    # ALL ports to controller — Slurm fan-out tree RPC sends RESPONSE_FORWARD_FAILED
    # back to slurmctld on an ephemeral source port; restricting blocks pings.
    - to:
        - podSelector:
            matchLabels:
              app: slurm-controller
    # Inter-worker collective traffic (NCCL/Gloo on ephemeral ports)
    - to:
        - podSelector:
            matchExpressions:
              - key: app
                operator: In
                values:
                  {{- range $workerLabels }}
                  - {{ . }}
                  {{- end }}
    # ALL ports to login — srun step I/O callback on ephemeral ports
    - to:
        - podSelector:
            matchLabels:
              app: slurm-login
    # NFS server
    - ports:
        - protocol: TCP
          port: 2049
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-login-egress
  namespace: {{ $ns }}
  labels:
    {{- include "slurm-platform.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      app: slurm-login
  policyTypes: [Egress]
  egress:
    # ALL ports to controller — fan-out RPC same as workers (sbatch / squeue)
    - to:
        - podSelector:
            matchLabels:
              app: slurm-controller
    # slurmd + SSH on workers
    - to:
        - podSelector:
            matchExpressions:
              - key: app
                operator: In
                values:
                  {{- range $workerLabels }}
                  - {{ . }}
                  {{- end }}
      ports:
        - protocol: TCP
          port: 6818
        - protocol: TCP
          port: 22
    # NFS server
    - ports:
        - protocol: TCP
          port: 2049
{{- if .Values.monitoring.enabled }}
{{/*
Cross-namespace allowances for the monitoring stack:
  • Prometheus (in monitoring namespace) → slurm-elastic-operator:8000
  • Prometheus (in monitoring namespace) → slurm-exporter:9341
  • slurm-exporter (in slurm namespace)  → controller:6820 (slurmrestd)
*/}}
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-prometheus-scrape-operator
  namespace: {{ $ns }}
  labels:
    {{- include "slurm-platform.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      app: slurm-elastic-operator
  policyTypes: [Ingress]
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ .Values.monitoring.namespace }}
      ports:
        - protocol: TCP
          port: 8000
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-prometheus-scrape-exporter
  namespace: {{ $ns }}
  labels:
    {{- include "slurm-platform.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      app: slurm-exporter
  policyTypes: [Ingress]
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ .Values.monitoring.namespace }}
      ports:
        - protocol: TCP
          port: 9341
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-slurm-exporter-egress
  namespace: {{ $ns }}
  labels:
    {{- include "slurm-platform.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      app: slurm-exporter
  policyTypes: [Egress]
  egress:
    # slurmrestd on the controller pod
    - to:
        - podSelector:
            matchLabels:
              app: slurm-controller
      ports:
        - protocol: TCP
          port: 6820
{{- end }}
{{- end }}
