{{/*
Namespace with Pod Security Standards label.

Worker pods that need NVIDIA runtime / hostIPC etc. require at least
`baseline`. `restricted` would block runtimeClassName=nvidia and is too
strict for HPC workloads; `privileged` is loose. Default `baseline`.

The namespace is rendered as a regular release resource (not a hook).
We tried `helm.sh/hook=pre-install,pre-upgrade` previously, but the
default hook delete policy (`before-hook-creation`) caused helm to delete
the namespace before recreating it on every upgrade — cascade-deleting
every secret, PVC, and pre-existing add-on inside it. `--create-namespace`
on `helm install` is enough; a pre-existing namespace is adopted by Helm
only with `--take-ownership` (Helm 3.16+).

helm.sh/resource-policy=keep prevents `helm uninstall` from nuking the
namespace and any out-of-release resources (mysql + slurmdbd accounting,
lmod modulefile ConfigMaps, etc.) that were applied alongside the chart.
*/}}
apiVersion: v1
kind: Namespace
metadata:
  name: {{ .Values.cluster.namespace }}
  labels:
    {{- include "slurm-platform.labels" . | nindent 4 }}
    pod-security.kubernetes.io/enforce: {{ .Values.cluster.podSecurity }}
    pod-security.kubernetes.io/audit: {{ .Values.cluster.podSecurity }}
    pod-security.kubernetes.io/warn: {{ .Values.cluster.podSecurity }}
  annotations:
    "helm.sh/resource-policy": keep
