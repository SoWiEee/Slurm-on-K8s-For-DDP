{{/*
Stage A: single ConfigMap mirroring scripts/render-core.py output. Stage B
will split this into slurm-config-static (header) + slurm-config-nodes
(NodeName / PartitionName / gres) so a pool replica change does not roll
all workers. For now we keep a single ConfigMap to match the current
manifests/core/slurm-static.yaml byte-for-byte where possible.
*/}}
apiVersion: v1
kind: ConfigMap
metadata:
  name: slurm-config
  namespace: {{ .Values.cluster.namespace }}
  labels:
    {{- include "slurm-platform.labels" . | nindent 4 }}
data:
  slurm.conf: |
{{ include "slurm-platform.slurmConf" . | indent 4 }}
{{- $gres := include "slurm-platform.gresConf" . }}
{{- if $gres }}
  gres.conf: |
{{ $gres | indent 4 }}
{{- end }}
