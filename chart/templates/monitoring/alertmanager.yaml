{{- if .Values.monitoring.enabled -}}
{{/*
Alertmanager — receives Prometheus alerts. The default route lands on
`dev-null` (silent); when monitoring.alertmanager.slack.webhookUrl is set
the receiver is rewritten to `slack-default` with the supplied webhook.
This mirrors the legacy manifest's documented production toggle without
making the user re-templatize alertmanager.yml.
*/}}
{{- $mNs := .Values.monitoring.namespace -}}
{{- $am := .Values.monitoring.alertmanager -}}
{{- $useSlack := and $am.slack $am.slack.webhookUrl -}}
apiVersion: v1
kind: ConfigMap
metadata:
  name: alertmanager-config
  namespace: {{ $mNs }}
  labels:
    {{- include "slurm-platform.labels" . | nindent 4 }}
data:
  alertmanager.yml: |
    global:
      resolve_timeout: 5m

    route:
      receiver: {{ if $useSlack }}slack-default{{ else }}dev-null{{ end }}
      group_by: [alertname, severity, component]
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 4h
      routes:
        - matchers:
            - severity = "critical"
          receiver: {{ if $useSlack }}slack-default{{ else }}dev-null{{ end }}
          group_wait: 10s
          repeat_interval: 1h
        - matchers:
            - severity = "warning"
          receiver: {{ if $useSlack }}slack-default{{ else }}dev-null{{ end }}
          repeat_interval: 2h

    receivers:
      - name: dev-null
      {{- if $useSlack }}
      - name: slack-default
        slack_configs:
          - api_url: {{ $am.slack.webhookUrl | quote }}
            channel: {{ $am.slack.channel | quote }}
            title: '[{{ "{{ .Status | toUpper }}" }}] {{ "{{ .CommonAnnotations.summary }}" }}'
            text: '{{ "{{ .CommonAnnotations.description }}" }}'
      {{- end }}

    inhibit_rules:
      - source_matchers: [severity = "critical"]
        target_matchers: [severity = "warning"]
        equal: [component]
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: alertmanager
  namespace: {{ $mNs }}
  labels:
    {{- include "slurm-platform.labels" . | nindent 4 }}
    app: alertmanager
spec:
  replicas: 1
  selector:
    matchLabels:
      app: alertmanager
  template:
    metadata:
      labels:
        {{- include "slurm-platform.labels" . | nindent 8 }}
        app: alertmanager
    spec:
      containers:
        - name: alertmanager
          image: {{ $am.image }}
          imagePullPolicy: IfNotPresent
          args:
            - --config.file=/etc/alertmanager/alertmanager.yml
            - --storage.path=/alertmanager
            - --log.level=info
          ports:
            - name: http
              containerPort: 9093
              protocol: TCP
          readinessProbe:
            httpGet:
              path: /-/ready
              port: 9093
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /-/healthy
              port: 9093
            initialDelaySeconds: 10
            periodSeconds: 15
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              memory: 128Mi
          volumeMounts:
            - name: config
              mountPath: /etc/alertmanager/
            - name: storage
              mountPath: /alertmanager
      volumes:
        - name: config
          configMap:
            name: alertmanager-config
        - name: storage
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: alertmanager
  namespace: {{ $mNs }}
  labels:
    {{- include "slurm-platform.labels" . | nindent 4 }}
    app: alertmanager
spec:
  type: ClusterIP
  selector:
    app: alertmanager
  ports:
    - name: http
      port: 9093
      targetPort: 9093
      protocol: TCP
{{- end }}
