{{/*
OpenTelemetry Collector — receives OTLP from Operator and RL Scheduler,
forwards to Grafana Tempo. Phase 7-A.
Enabled by .Values.monitoring.otel.enabled (default: false).
*/}}
{{- if .Values.monitoring.otel.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: otel-collector-config
  namespace: {{ .Values.monitoring.namespace }}
  labels:
    {{- include "slurm-platform.labels" . | nindent 4 }}
data:
  config.yaml: |
    receivers:
      otlp:
        protocols:
          grpc:
            endpoint: "0.0.0.0:4317"
          http:
            endpoint: "0.0.0.0:4318"

    exporters:
      otlp:
        endpoint: "tempo.{{ .Values.monitoring.namespace }}.svc.cluster.local:4317"
        tls:
          insecure: true

    service:
      pipelines:
        traces:
          receivers: [otlp]
          exporters: [otlp]
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: otel-collector
  namespace: {{ .Values.monitoring.namespace }}
  labels:
    {{- include "slurm-platform.labels" . | nindent 4 }}
    app: otel-collector
spec:
  replicas: 1
  selector:
    matchLabels:
      app: otel-collector
  template:
    metadata:
      labels:
        {{- include "slurm-platform.labels" . | nindent 8 }}
        app: otel-collector
    spec:
      containers:
        - name: otel-collector
          image: {{ .Values.monitoring.otel.collectorImage | default "otel/opentelemetry-collector-contrib:0.102.0" }}
          args: ["--config=/conf/config.yaml"]
          ports:
            - containerPort: 4317
              name: otlp-grpc
            - containerPort: 4318
              name: otlp-http
          volumeMounts:
            - name: config
              mountPath: /conf
      volumes:
        - name: config
          configMap:
            name: otel-collector-config
---
apiVersion: v1
kind: Service
metadata:
  name: otel-collector
  namespace: {{ .Values.monitoring.namespace }}
  labels:
    {{- include "slurm-platform.labels" . | nindent 4 }}
    app: otel-collector
spec:
  selector:
    app: otel-collector
  ports:
    - name: otlp-grpc
      port: 4317
      targetPort: 4317
    - name: otlp-http
      port: 4318
      targetPort: 4318
{{- end }}
