{{- if .Values.monitoring.enabled -}}
{{/*
kube-state-metrics — exposes K8s object state (StatefulSet replicas,
Deployment status, Pod phase) so the operator dashboard can correlate
slurmctld view of node count vs actual K8s replica count.

ClusterRole is restricted to the four resource types the dashboards
actually use (statefulsets, deployments, pods, nodes); the upstream chart
defaults to a much broader allowlist that we don't need.
*/}}
{{- $mNs := .Values.monitoring.namespace -}}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: kube-state-metrics
  namespace: {{ $mNs }}
  labels:
    {{- include "slurm-platform.labels" . | nindent 4 }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ .Release.Name }}-kube-state-metrics
  labels:
    {{- include "slurm-platform.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources:
      - pods
      - nodes
      - namespaces
    verbs: ["list", "watch"]
  - apiGroups: ["apps"]
    resources:
      - statefulsets
      - deployments
    verbs: ["list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ .Release.Name }}-kube-state-metrics
  labels:
    {{- include "slurm-platform.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ .Release.Name }}-kube-state-metrics
subjects:
  - kind: ServiceAccount
    name: kube-state-metrics
    namespace: {{ $mNs }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kube-state-metrics
  namespace: {{ $mNs }}
  labels:
    {{- include "slurm-platform.labels" . | nindent 4 }}
    app: kube-state-metrics
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kube-state-metrics
  template:
    metadata:
      labels:
        {{- include "slurm-platform.labels" . | nindent 8 }}
        app: kube-state-metrics
    spec:
      serviceAccountName: kube-state-metrics
      containers:
        - name: kube-state-metrics
          image: {{ .Values.monitoring.kubeStateMetrics.image }}
          imagePullPolicy: IfNotPresent
          args:
            - --resources=statefulsets,deployments,pods,nodes
          ports:
            - name: http-metrics
              containerPort: 8080
              protocol: TCP
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: kube-state-metrics
  namespace: {{ $mNs }}
  labels:
    {{- include "slurm-platform.labels" . | nindent 4 }}
    app: kube-state-metrics
spec:
  type: ClusterIP
  selector:
    app: kube-state-metrics
  ports:
    - name: http-metrics
      port: 8080
      targetPort: 8080
      protocol: TCP
{{- end }}
