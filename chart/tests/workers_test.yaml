suite: worker StatefulSets
templates:
  - workers.yaml
  - configmap-static.yaml
  - configmap-nodes.yaml
  - configmap-task-prolog.yaml
tests:
  - it: GPU pool gets nvidia runtimeClass + nvidia.com/gpu on k3s
    template: workers.yaml
    set:
      cluster.runtime: k3s
    asserts:
      - matchRegex:
          path: spec.template.spec.runtimeClassName
          pattern: "^nvidia$"
        documentSelector:
          path: metadata.name
          value: slurm-worker-gpu-rtx4070
      - matchRegex:
          path: spec.template.spec.containers[0].resources.limits["nvidia.com/gpu"]
          pattern: "^1$"
        documentSelector:
          path: metadata.name
          value: slurm-worker-gpu-rtx4070

  - it: GPU pool gets NO nvidia runtime on kind (cluster.runtime != k3s)
    template: workers.yaml
    set:
      cluster.runtime: kind
    asserts:
      - isNull:
          path: spec.template.spec.runtimeClassName
        documentSelector:
          path: metadata.name
          value: slurm-worker-gpu-rtx4070

  - it: CPU pool never has GPU resources regardless of runtime
    template: workers.yaml
    set:
      cluster.runtime: k3s
    asserts:
      - isNull:
          path: spec.template.spec.runtimeClassName
        documentSelector:
          path: metadata.name
          value: slurm-worker-cpu
      - isNull:
          path: spec.template.spec.containers[0].resources.limits["nvidia.com/gpu"]
        documentSelector:
          path: metadata.name
          value: slurm-worker-cpu

  - it: workers do NOT mount the JWT secret (controller+operator only)
    template: workers.yaml
    asserts:
      - notContains:
          path: spec.template.spec.volumes
          content:
            name: slurm-jwt-secret
        documentSelector:
          path: metadata.name
          value: slurm-worker-cpu
      - notContains:
          path: spec.template.spec.volumes
          content:
            name: slurm-jwt-secret
        documentSelector:
          path: metadata.name
          value: slurm-worker-gpu-rtx4070

  - it: workers carry checksum annotations for ConfigMap content (R3)
    template: workers.yaml
    asserts:
      - exists:
          path: spec.template.metadata.annotations["checksum/config-static"]
        documentSelector:
          path: metadata.name
          value: slurm-worker-cpu
      - exists:
          path: spec.template.metadata.annotations["checksum/config-nodes"]
        documentSelector:
          path: metadata.name
          value: slurm-worker-cpu

  - it: workers do NOT mount cgroup.conf in default (PSS=baseline) profile (R9)
    template: workers.yaml
    asserts:
      - notContains:
          path: spec.template.spec.containers[0].volumeMounts
          content:
            name: slurm-config-static
            mountPath: /etc/slurm/cgroup.conf
            subPath: cgroup.conf
        documentSelector:
          path: metadata.name
          value: slurm-worker-cpu

  - it: workers carry CPU+memory requests/limits matching pool.cpus / realMemory (R7)
    template: workers.yaml
    set:
      cluster.runtime: k3s
    asserts:
      # CPU pool: 4 cpu / 3500Mi — Guaranteed QoS (requests == limits)
      - equal:
          path: spec.template.spec.containers[0].resources.requests.cpu
          value: "4"
        documentSelector:
          path: metadata.name
          value: slurm-worker-cpu
      - equal:
          path: spec.template.spec.containers[0].resources.limits.cpu
          value: "4"
        documentSelector:
          path: metadata.name
          value: slurm-worker-cpu
      - equal:
          path: spec.template.spec.containers[0].resources.requests.memory
          value: "3500Mi"
        documentSelector:
          path: metadata.name
          value: slurm-worker-cpu
      - equal:
          path: spec.template.spec.containers[0].resources.limits.memory
          value: "3500Mi"
        documentSelector:
          path: metadata.name
          value: slurm-worker-cpu
      # GPU pool keeps nvidia.com/gpu alongside cpu/memory
      - equal:
          path: spec.template.spec.containers[0].resources.requests["nvidia.com/gpu"]
          value: "1"
        documentSelector:
          path: metadata.name
          value: slurm-worker-gpu-rtx4070
      - equal:
          path: spec.template.spec.containers[0].resources.requests.cpu
          value: "4"
        documentSelector:
          path: metadata.name
          value: slurm-worker-gpu-rtx4070

  - it: workers use OnDelete updateStrategy so helm upgrade does not kill running jobs (R10)
    template: workers.yaml
    asserts:
      - equal:
          path: spec.updateStrategy.type
          value: OnDelete
        documentSelector:
          path: metadata.name
          value: slurm-worker-cpu
      - equal:
          path: spec.updateStrategy.type
          value: OnDelete
        documentSelector:
          path: metadata.name
          value: slurm-worker-gpu-rtx4070

  - it: slurmd command no longer hardcodes -Dvvv (R12)
    template: workers.yaml
    asserts:
      - notMatchRegex:
          path: spec.template.spec.containers[0].command[2]
          pattern: "slurmd -Dvvv"
        documentSelector:
          path: metadata.name
          value: slurm-worker-cpu
      - matchRegex:
          path: spec.template.spec.containers[0].command[2]
          pattern: "exec slurmd -D -N"
        documentSelector:
          path: metadata.name
          value: slurm-worker-cpu
