suite: slurm.conf rendering
templates:
  - configmap-static.yaml
  - configmap-nodes.yaml
tests:
  - it: emits ClusterName and SlurmctldHost from values
    template: configmap-static.yaml
    asserts:
      - matchRegex:
          path: data["slurm.conf"]
          pattern: "ClusterName=kind-slurm"
      - matchRegex:
          path: data["slurm.conf"]
          pattern: "SlurmctldHost=slurm-controller-0"
      - matchRegex:
          path: data["slurm.conf"]
          pattern: "Include /etc/slurm/slurm.nodes.conf"

  - it: emits accounting block when slurm.accounting.enabled
    template: configmap-static.yaml
    set:
      slurm.accounting.enabled: true
    asserts:
      - matchRegex:
          path: data["slurm.conf"]
          pattern: "AccountingStorageType=accounting_storage/slurmdbd"
      - matchRegex:
          path: data["slurm.conf"]
          pattern: "AccountingStorageTRES=gres/gpu,gres/mps"

  - it: omits accounting block when disabled
    template: configmap-static.yaml
    set:
      slurm.accounting.enabled: false
    asserts:
      - notMatchRegex:
          path: data["slurm.conf"]
          pattern: "AccountingStorageType="

  - it: emits NodeName lines for each pool in maxNodes order
    template: configmap-nodes.yaml
    asserts:
      - matchRegex:
          path: data["slurm.nodes.conf"]
          pattern: "NodeName=slurm-worker-cpu-0 .*State=UNKNOWN"
      - matchRegex:
          path: data["slurm.nodes.conf"]
          pattern: "NodeName=slurm-worker-gpu-rtx4070-0 .*Gres=gpu:rtx4070:1,mps:100"

  - it: skips PartitionName when no nodes assigned
    template: configmap-nodes.yaml
    set:
      pools:
        - id: cpu
          statefulset: slurm-worker-cpu
          appLabel: slurm-worker-cpu
          workerClass: cpu-standard
          partition: cpu
          minReplicas: 1
          maxReplicas: 1
          replicas: 1
          cpus: 4
          realMemory: 3500
          sockets: 1
          coresPerSocket: 2
          threadsPerCore: 2
          maxNodes: 1
          features: [cpu]
          gres: []
          matchGres: []
    asserts:
      - matchRegex:
          path: data["slurm.nodes.conf"]
          pattern: "PartitionName=cpu Nodes=slurm-worker-cpu-0"
      - notMatchRegex:
          path: data["slurm.nodes.conf"]
          pattern: "PartitionName=gpu-rtx4070 "

  - it: gres.conf uses /dev/null on kind, /dev/nvidia0 on k3s
    template: configmap-nodes.yaml
    set:
      cluster.runtime: kind
    asserts:
      - matchRegex:
          path: data["gres.conf"]
          pattern: "File=/dev/null"
      - notMatchRegex:
          path: data["gres.conf"]
          pattern: "File=/dev/nvidia0"

  - it: gres.conf emits mps Count without File on any runtime
    template: configmap-nodes.yaml
    set:
      cluster.runtime: k3s
    asserts:
      - matchRegex:
          path: data["gres.conf"]
          pattern: "Name=mps Count=100"
      - matchRegex:
          path: data["gres.conf"]
          pattern: "Name=gpu Type=rtx4070 Count=1 File=/dev/nvidia0 Cores=0-3"

  - it: gres.conf includes Cores= range from pool.cpus for cons_tres binding (R8)
    template: configmap-nodes.yaml
    set:
      cluster.runtime: k3s
    asserts:
      # rtx4070 pool has cpus=4 → Cores=0-3
      - matchRegex:
          path: data["gres.conf"]
          pattern: "NodeName=slurm-worker-gpu-rtx4070-0 .*Cores=0-3"
      # rtx4080 pool also cpus=4 → Cores=0-3 (verifies it's not hardcoded
      # to one pool)
      - matchRegex:
          path: data["gres.conf"]
          pattern: "NodeName=slurm-worker-gpu-rtx4080-0 .*Cores=0-3"
      # mps lines must NOT have Cores= (Slurm derives mps Cores from gpu)
      - notMatchRegex:
          path: data["gres.conf"]
          pattern: "Name=mps .*Cores="

  - it: emits SlurmctldDebug and SlurmdDebug from values (R12)
    template: configmap-static.yaml
    set:
      slurm.slurmctldDebug: debug
      slurm.slurmdDebug: verbose
    asserts:
      - matchRegex:
          path: data["slurm.conf"]
          pattern: "SlurmctldDebug=debug"
      - matchRegex:
          path: data["slurm.conf"]
          pattern: "SlurmdDebug=verbose"

  - it: defaults SlurmctldDebug / SlurmdDebug to info when unset
    template: configmap-static.yaml
    set:
      slurm.slurmctldDebug: null
      slurm.slurmdDebug: null
    asserts:
      - matchRegex:
          path: data["slurm.conf"]
          pattern: "SlurmctldDebug=info"
      - matchRegex:
          path: data["slurm.conf"]
          pattern: "SlurmdDebug=info"

  - it: cgroup.conf is suppressed when no cgroup plugin is in use (R9 default)
    template: configmap-static.yaml
    asserts:
      - notExists:
          path: data["cgroup.conf"]

  - it: cgroup.conf is emitted when proctrack/cgroup is enabled (privileged overlay)
    template: configmap-static.yaml
    set:
      slurm.proctrackType: proctrack/cgroup
      slurm.taskPlugin: task/cgroup,task/affinity
    asserts:
      - matchRegex:
          path: data["cgroup.conf"]
          pattern: "CgroupPlugin=autodetect"
      - matchRegex:
          path: data["cgroup.conf"]
          pattern: "ConstrainCores=yes"
      - matchRegex:
          path: data["cgroup.conf"]
          pattern: "ConstrainDevices=yes"

  - it: M1 default emits backfill + multifactor scheduler knobs
    template: configmap-static.yaml
    asserts:
      - matchRegex:
          path: data["slurm.conf"]
          pattern: "SchedulerType=sched/backfill"
      - matchRegex:
          path: data["slurm.conf"]
          pattern: "SchedulerParameters=bf_window=720,bf_resolution=30,bf_continue,bf_max_job_test=200"
      - matchRegex:
          path: data["slurm.conf"]
          pattern: "PriorityType=priority/multifactor"
      - matchRegex:
          path: data["slurm.conf"]
          pattern: "PriorityWeightAge=1000"
      - matchRegex:
          path: data["slurm.conf"]
          pattern: "PriorityWeightJobSize=500"
      - matchRegex:
          path: data["slurm.conf"]
          pattern: "PriorityWeightQOS=2000"

  - it: M1 preempt block omitted when disabled (default)
    template: configmap-static.yaml
    asserts:
      - notMatchRegex:
          path: data["slurm.conf"]
          pattern: "PreemptType="
      - notMatchRegex:
          path: data["slurm.conf"]
          pattern: "PreemptMode="

  - it: M1 preempt block emitted when slurm.scheduling.preempt.enabled
    template: configmap-static.yaml
    set:
      slurm.scheduling.preempt.enabled: true
    asserts:
      - matchRegex:
          path: data["slurm.conf"]
          pattern: "PreemptType=preempt/qos"
      - matchRegex:
          path: data["slurm.conf"]
          pattern: "PreemptMode=REQUEUE"

  - it: M1 CR_Pack_Nodes opt-in via slurm.selectTypeParameters override
    template: configmap-static.yaml
    set:
      slurm.selectTypeParameters: "CR_Core,CR_Pack_Nodes"
    asserts:
      - matchRegex:
          path: data["slurm.conf"]
          pattern: "SelectTypeParameters=CR_Core,CR_Pack_Nodes"

  - it: M1 schedulerParameters override flows through
    template: configmap-static.yaml
    set:
      slurm.scheduling.schedulerParameters: "bf_window=1440,bf_resolution=60"
    asserts:
      - matchRegex:
          path: data["slurm.conf"]
          pattern: "SchedulerParameters=bf_window=1440,bf_resolution=60"

  - it: TaskPlugin / ProctrackType default for PSS=baseline pods (R9 known limit)
    template: configmap-static.yaml
    asserts:
      # cgroup/v2 plugin needs dbus+systemd which our baseline pods don't have.
      # See values.yaml comment under R9 for the upgrade path.
      - matchRegex:
          path: data["slurm.conf"]
          pattern: "TaskPlugin=task/affinity"
      - matchRegex:
          path: data["slurm.conf"]
          pattern: "ProctrackType=proctrack/linuxproc"
