suite: elastic operator
templates:
  - operator.yaml
tests:
  - it: PARTITIONS_JSON contains all configured pools
    asserts:
      - matchRegex:
          path: spec.template.spec.containers[0].env[?(@.name=="PARTITIONS_JSON")].value
          pattern: '"partition":"cpu"'
        documentSelector:
          path: kind
          value: Deployment
      - matchRegex:
          path: spec.template.spec.containers[0].env[?(@.name=="PARTITIONS_JSON")].value
          pattern: '"partition":"gpu-rtx4070"'
        documentSelector:
          path: kind
          value: Deployment
      - matchRegex:
          path: spec.template.spec.containers[0].env[?(@.name=="PARTITIONS_JSON")].value
          pattern: '"partition":"gpu-rtx4080"'
        documentSelector:
          path: kind
          value: Deployment

  - it: operator mounts the JWT secret for slurmrestd auth (mode=0400 for Slurm 23.11)
    asserts:
      - contains:
          path: spec.template.spec.volumes
          content:
            name: slurm-jwt-secret
            secret:
              secretName: slurm-jwt-secret
              defaultMode: 0400
        documentSelector:
          path: kind
          value: Deployment

  - it: DRAIN_TIMEOUT_SECONDS env + per-pool drain_timeout_seconds in PARTITIONS_JSON (R1)
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: DRAIN_TIMEOUT_SECONDS
            value: "1800"
        documentSelector:
          path: kind
          value: Deployment
      - matchRegex:
          path: spec.template.spec.containers[0].env[?(@.name=="PARTITIONS_JSON")].value
          pattern: '"drain_timeout_seconds":1800'
        documentSelector:
          path: kind
          value: Deployment

  - it: drainTimeoutSeconds value override flows to env + PARTITIONS_JSON (R1)
    set:
      operator.drainTimeoutSeconds: 600
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: DRAIN_TIMEOUT_SECONDS
            value: "600"
        documentSelector:
          path: kind
          value: Deployment
      - matchRegex:
          path: spec.template.spec.containers[0].env[?(@.name=="PARTITIONS_JSON")].value
          pattern: '"drain_timeout_seconds":600'
        documentSelector:
          path: kind
          value: Deployment

  - it: event-driven loop env wired (R21)
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: SLURM_POLL_INTERVAL_SECONDS
            value: "1"
        documentSelector:
          path: kind
          value: Deployment
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: RECONCILE_PERIOD_SECONDS
            value: "60"
        documentSelector:
          path: kind
          value: Deployment

  - it: operator Service exposes port 8000 for Prometheus scraping
    asserts:
      - equal:
          path: spec.ports[0].port
          value: 8000
        documentSelector:
          path: kind
          value: Service

  - it: M7 fragmentation env disabled by default
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: FRAGMENTATION_ENABLED
            value: "false"
        documentSelector:
          path: kind
          value: Deployment
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: FRAGMENTATION_SHADOW_MODE
            value: "true"
        documentSelector:
          path: kind
          value: Deployment

  - it: M7 fragmentation env wires through chart values
    set:
      operator.fragmentation.enabled: true
      operator.fragmentation.shadowMode: false
      operator.fragmentation.minIntervalSeconds: 30
      operator.fragmentation.maxRequeuesPerHour: 10
      operator.fragmentation.maxTargetsPerDecision: 2
      operator.fragmentation.priorityGap: 500
      operator.fragmentation.mpsPerNode: 200
      operator.fragmentation.partitions:
        - gpu-rtx4070
        - gpu-h100
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: FRAGMENTATION_ENABLED
            value: "true"
        documentSelector:
          path: kind
          value: Deployment
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: FRAGMENTATION_SHADOW_MODE
            value: "false"
        documentSelector:
          path: kind
          value: Deployment
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: FRAGMENTATION_MIN_INTERVAL_SECONDS
            value: "30"
        documentSelector:
          path: kind
          value: Deployment
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: FRAGMENTATION_MAX_REQUEUES_PER_HOUR
            value: "10"
        documentSelector:
          path: kind
          value: Deployment
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: FRAGMENTATION_PRIORITY_GAP
            value: "500"
        documentSelector:
          path: kind
          value: Deployment
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: FRAGMENTATION_MPS_PER_NODE
            value: "200"
        documentSelector:
          path: kind
          value: Deployment
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: FRAGMENTATION_PARTITIONS
            value: "gpu-rtx4070,gpu-h100"
        documentSelector:
          path: kind
          value: Deployment
