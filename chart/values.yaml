# =============================================================================
# slurm-platform — default values (Kind / Windows + Docker Desktop baseline)
# =============================================================================
# This file is the development baseline. For production k3s + real GPU, layer
# `values-k3s.yaml` on top via `helm install ... -f values-k3s.yaml`.
#
# Stage A scope: only `cluster`, `partitions`, `pools`, and `slurm` are wired
# into templates. Other top-level keys (image, gpu, operator, monitoring,
# storage, secrets, networkPolicy) are pre-declared per docs/note.md §5-A so
# values overlays can be authored once and stay valid through Stages B–F.

cluster:
  name: kind-slurm           # Slurm ClusterName; kept as kind-slurm to match
                             # current manifests/core/slurm-static.yaml byte-equivalent.
  namespace: slurm
  runtime: kind              # kind | k3s — affects taskPlugin defaults and
                             # gres.conf File path (k3s → /dev/nvidia0).
  podSecurity: baseline      # baseline | restricted | privileged.

# Partition definitions in slurm.conf order. Each pool below references one
# of these by name via `pool.partition`.
partitions:
  - name: cpu
    default: true
    maxTime: INFINITE
    state: UP
  - name: gpu-rtx4070
    default: false
    maxTime: INFINITE
    state: UP
  - name: gpu-rtx4080
    default: false
    maxTime: INFINITE
    state: UP

# Worker pools — ordered list (NOT a map). The order here determines the
# emission order of NodeName lines in slurm.conf and gres.conf, which affects
# Slurm's node ordinal assignment. Do not reorder unless you know what you're
# doing.
#
# `gres` accepts both inline strings ("gpu:rtx4070:1", "mps:100") and the
# structured form ({name, type, count}); _helpers.tpl normalizes both. The
# structured form is preferred for new configs.
pools:
  - id: cpu
    statefulset: slurm-worker-cpu
    appLabel: slurm-worker-cpu
    workerClass: cpu-standard
    partition: cpu
    minReplicas: 1
    maxReplicas: 4
    replicas: 1                # initial replicas; operator scales between min/max
    scaleCooldownSeconds: 60
    cpus: 4
    realMemory: 3500
    sockets: 1
    coresPerSocket: 2
    threadsPerCore: 2
    maxNodes: 4
    features: [cpu]
    gres: []
    matchGres: []
    fallback: true

  - id: gpu-rtx4070
    statefulset: slurm-worker-gpu-rtx4070
    appLabel: slurm-worker-gpu-rtx4070
    workerClass: gpu-rtx4070
    partition: gpu-rtx4070
    minReplicas: 0
    maxReplicas: 2
    replicas: 0
    scaleCooldownSeconds: 60
    cpus: 4
    realMemory: 3500
    sockets: 1
    coresPerSocket: 2
    threadsPerCore: 2
    maxNodes: 2
    features: [gpu, gpu-rtx4070]
    gres:
      - name: gpu
        type: rtx4070
        count: 1
      - name: mps
        count: 100
    matchGres: ["gpu:rtx4070", "mps"]
    devicePluginConfig: rtx4070-mps

  - id: gpu-rtx4080
    statefulset: slurm-worker-gpu-rtx4080
    appLabel: slurm-worker-gpu-rtx4080
    workerClass: gpu-rtx4080
    partition: gpu-rtx4080
    minReplicas: 0
    maxReplicas: 2
    replicas: 0
    scaleCooldownSeconds: 60
    cpus: 4
    realMemory: 3500
    sockets: 1
    coresPerSocket: 2
    threadsPerCore: 2
    maxNodes: 2
    features: [gpu, gpu-rtx4080]
    gres:
      - name: gpu
        type: rtx4080
        count: 1
    matchGres: ["gpu:rtx4080"]
    devicePluginConfig: rtx4080-exclusive

slurm:
  # K1 (v5 review): slurmctld in-memory state grows with queue depth. 2Gi limit
  # covers ~10k concurrent jobs; raise for larger deployments. Pinned to
  # Guaranteed QoS so slurmctld is not the first thing evicted under pressure.
  controllerResources:
    requests:
      cpu: "200m"
      memory: "512Mi"
    limits:
      cpu: "2"
      memory: "2Gi"
  # Header values for slurm.conf. Defaults match the current
  # render-core.py output verbatim, so Stage A produces a byte-equivalent
  # ConfigMap. Override per-environment in values-k3s.yaml / values-dev.yaml.
  controllerHost: slurm-controller-0
  controllerService: slurm-controller
  authType: auth/munge
  credType: cred/munge
  cryptoType: crypto/munge
  authAltTypes: auth/jwt
  authAltParameters: jwt_key=/slurm-secrets/jwt_hs256.key
  selectType: select/cons_tres
  selectTypeParameters: CR_Core
  switchType: switch/none
  mpiDefault: pmi2
  returnToService: 2
  # CompleteWait=0 prevents COMPLETING-stuck jobs when a worker pod is evicted
  # mid-epilog (see docs/note.md mps-migration debug record).
  completeWait: 0
  # R9 / R13 status (2026-05-05 — both deferred):
  # An attempt to upgrade Slurm 21.08 → 23.11 (Ubuntu 22.04 → 24.04 base)
  # exposed multiple new incompatibilities with PSS=baseline pods:
  #   1. Slurm 23.11 slurmstepd ALWAYS calls org.freedesktop.systemd1 over
  #      dbus to create a transient cgroup scope, even when TaskPlugin is
  #      task/affinity (no opt-out). Without /run/dbus mounted, slurmd
  #      refuses to start → "cgroup_dbus_attach_to_scope: cannot connect".
  #   2. JWT key file mode is enforced as 0400/0600 (was 0644 in 21.08).
  #   3. openapi/v0.0.37 was removed; slurmrestd needs v0.0.40 plugin.
  #   4. auth_jwt.so was split out to slurm-wlm-jwt-plugin package.
  #   5. slurmdbd state file format changed (incompatible PVC migration).
  # The dbus / systemd-scope dependency (#1) is the blocker — it requires
  # PSS=privileged + hostPath dbus or a systemd init container, which
  # widens the attack surface beyond what fits the academic demo. We stay
  # on Slurm 21.08 + task/affinity + proctrack/linuxproc until the chart
  # gets a privileged overlay. R9 (clean process-tree kill via cgroup) is
  # therefore deferred until R13 (Slurm version upgrade) lands.
  taskPlugin: task/affinity
  proctrackType: proctrack/linuxproc
  # cgroup.conf is still emitted (Slurm reads it whenever any cgroup plugin
  # is referenced, including from accounting/JobAcctGather). Defaults are
  # safe even when no cgroup task plugin is active.
  cgroup:
    plugin: autodetect
    constrainCores: "yes"
    constrainRamSpace: "yes"
    constrainDevices: "yes"
    constrainSwapSpace: "no"
  # Daemon log levels (R12 fix). Replaces hardcoded `slurmctld -Dvvv` /
  # `slurmd -Dvvv` startup args. Values: quiet | fatal | error | info |
  # verbose | debug | debug2 | debug3 | debug4 | debug5. `info` is plenty
  # for production; bump to `debug` only when troubleshooting.
  slurmctldDebug: info
  slurmdDebug: info
  # TaskProlog runs on the compute node before each task; lines of the form
  # `export X=Y` printed to stdout are merged into the job environment. We use
  # this to forward CUDA_MPS_PIPE_DIRECTORY (injected into worker containers
  # by NVIDIA's container-toolkit hook) into Slurm jobs — without this, CUDA
  # can't find the MPS server socket and silently bypasses MPS. See
  # chart/templates/configmap-task-prolog.yaml. Set to "" to disable.
  taskProlog: /etc/slurm/prolog.d/10-mps-env.sh
  mailProg: /usr/bin/true
  slurmctldPidFile: /var/run/slurmctld.pid
  slurmdPidFile: /var/run/slurmd.pid
  slurmdSpoolDir: /var/spool/slurmd
  slurmUser: root
  stateSaveLocation: /var/spool/slurmctld
  slurmctldPort: 6817
  slurmdPort: 6818
  accounting:
    enabled: true                                  # adds AccountingStorage* lines
    storageType: accounting_storage/slurmdbd
    storageHost: slurmdbd.slurm.svc.cluster.local
    storagePort: 6819
    jobAcctGatherType: jobacct_gather/linux
    jobAcctGatherFrequency: 30
    storageTres: ["gres/gpu", "gres/mps"]          # AccountingStorageTRES
  jwt:
    keyPath: /slurm-secrets/jwt_hs256.key
    lifespanSeconds: 86400                         # used by Stage B+ controller scripts
  fairshare:
    enabled: false                                 # P1+ feature
  # M1 (Phase 6): Slurm built-in scheduling knobs. The defaults below match
  # Slurm's built-in behaviour for selectTypeParameters (CR_Core, no Pack)
  # and turn on backfill + multifactor priority — both already on in stock
  # Slurm 21.08, just made explicit here so values.yaml is the single source
  # of truth. Preempt is OFF by default (M7 turns it on after the
  # checkpoint-aware requeue lands). See docs/scheduler.md §5.1.
  scheduling:
    # sched/backfill is strictly better than sched/builtin for our mixed
    # workload (long DDP + short cpu jobs). Override to sched/builtin only
    # for A/B comparisons.
    schedulerType: sched/backfill
    # bf_window=720 → look 12h ahead; bf_resolution=30 → 30s slot grain;
    # bf_continue → don't restart backfill on every new submission;
    # bf_max_job_test=200 → cap per-cycle job evaluations.
    schedulerParameters: "bf_window=720,bf_resolution=30,bf_continue,bf_max_job_test=200"
    priorityType: priority/multifactor
    priorityWeights:
      age: 1000           # 1 hour wait ≈ 1000 priority points
      fairshare: 0        # off until slurmdbd-driven fairshare lands
      jobSize: 500        # mild preference for larger jobs (helps DDP)
      partition: 1000     # partition.PriorityTier still dominates
      qos: 2000           # QOS dominates jobSize/age
    preempt:
      enabled: false      # M7 flips this on after checkpoint+requeue plumb
      type: preempt/qos
      mode: REQUEUE
  # Lua submit plugin. Disabled by default — when enabled, slurm.conf gets
  # `JobSubmitPlugins=lua` and the controller mounts /etc/slurm/job_submit.lua
  # from the slurm-config-job-submit ConfigMap. See docs/scheduler.md.
  jobSubmit:
    enabled: false
    # debugLog: write per-call summary to slurmctld.log at level info.
    # Useful for plumbing tests; turn off in steady state to avoid
    # log spam.
    debugLog: true
    # demoBoostPriority: when > 0, the scaffold sets job_desc.priority to
    # this value for any job whose name starts with "score-demo-". Set to 0
    # to disable.
    demoBoostPriority: 9999
    # scoreGain: multiplier converting the [0,1] score into a Slurm
    # priority delta. Roughly equal to PriorityWeightAge / hour so a
    # perfect score buys ~1 hour of age.
    scoreGain: 1000
    # scoreApply controls whether the computed score is applied to
    # job_desc.priority. Set to false to log score without changing
    # scheduling behaviour.
    scoreApply: true
    # Factor coefficients (α/β/γ/δ/ε). See docs/scheduler.md.
    # γ is reserved for topology; ε is only useful when the runtime predictor
    # is enabled and calibrated for the workload.
    scoreWeights:
      mpsFit: 0.40           # α
      vramFit: 0.20          # β
      topology: 0.00         # γ — reserved topology field
      fragmentation: 0.20    # δ
      predRuntime: 0.00      # ε — runtime predictor signal
    # VRAM tiers used by f_vram_fit. Sorted ascending. The smallest
    # tier ≥ job's vram constraint is treated as the ideal placement; the
    # plugin penalises over-provisioning.
    vramTiers: [12, 24]
    # Assumed MPS slots per GPU node. Slurm's gres.conf sets mps
    # Count=100 for our pools; embed it here so f_mps_fit / f_fragmentation
    # don't hard-code 100.
    mpsPerNode: 100
    # Predictor wiring. The lua plugin shells out to curl with --max-time
    # so a hung service can't stall slurmctld; the call is wrapped in pcall,
    # and a missing/empty response degrades to "no override". When enabled
    # without a reachable predictor the only effect is a single
    # `[predictor] skipped (...)` line per submission, so leaving this on by
    # mistake is safe — but the controller image MUST carry curl
    # (docker/controller/Dockerfile installs it on top of the slurm bundle).
    predictor:
      enabled: false
      # In-cluster Service URL — matches the chart's runtime-predictor
      # Service when runtimePredictor.enabled=true. Override per env if
      # the predictor lives in a different namespace.
      url: "http://runtime-predictor:8080/predict"
      # Hard timeout passed to `curl --max-time`. Keep small (≤200 ms).
      # slurmctld is single-threaded over the lua plugin call, so any
      # blocking here delays *every* sbatch.
      timeoutMs: 200
      # Cap on the override applied to job_desc.time_limit (minutes).
      # The lua clamps `pred_minutes` at fallbackHours·60 so a runaway
      # prediction can't ask for a 100-hour walltime.
      fallbackHours: 4
      # When true, the lua mutates job_desc.time_limit. Set false for
      # shadow-mode evaluation — the plugin still logs the prediction
      # but leaves walltime untouched.
      applyTimeLimit: true
      # GPU-type label sent when the job's --constraint doesn't carry
      # one. Aligns with the predictor's one-hot alphabet.
      defaultGpuType: rtx4070
    # Submit helper — auto-completes --mem / --partition /
    # --qos when the user didn't set them. All helpers are silently no-op
    # when disabled or when the user already provided a value.
    helper:
      # Master switch. When false, none of the three helpers run.
      enabled: true
      # --mem: heuristic memory request when user didn't set --mem.
      # Computed as gpuCount * memPerGpuMB + cpus * memPerCpuMB, floored
      # at minMemoryMB. Set memory: false to disable just the --mem helper.
      memory:
        enabled: true
        memPerGpuMB: 4096   # ~half of a typical AI training mini-batch
        memPerCpuMB: 256
        minMemoryMB: 1024
        maxMemoryMB: 65536  # safety cap so a 16-GPU request doesn't blow past node RAM
      # --partition: route based on tres_per_node GRES content. First match wins.
      # The fallback partition is used when no GRES match (typically CPU jobs).
      partition:
        enabled: true
        fallback: "cpu"
        # Each rule: { gres: "<substring>", partition: "<name>" }
        # Matching is case-insensitive substring on job_desc.tres_per_node.
        rules:
          - gres: "gpu:rtx4080"
            partition: "gpu-rtx4080"
          - gres: "gpu:rtx4070"
            partition: "gpu-rtx4070"
          - gres: "gpu:"           # generic GPU fallback
            partition: "gpu-rtx4070"
      # --qos: account → qos mapping. The "default" key is used when the
      # user's account isn't matched. Empty rules + default="" disables.
      qos:
        enabled: true
        default: "normal"
        rules:
          # Example: high-priority account always gets the 'high' qos.
          # - account: "research"
          #   qos: "high"
          # - account: "ci"
          #   qos: "low"
          []

# -- Image references (used Stage B onwards) ---------------------------------
image:
  controller: slurm-controller:latest
  worker: slurm-worker:latest
  operator: slurm-elastic-operator:latest
  pullPolicy: IfNotPresent

# -- GPU subsystem (used Stage D onwards) ------------------------------------
# This chart only renders the device-plugin-config ConfigMap and the
# post-install Job that labels GPU nodes. NVIDIA GPU Operator itself is
# installed separately into its own namespace via
# `scripts/install-gpu-operator.sh`; see Chart.yaml notes.
gpu:
  enabled: false                                   # Kind dev mode: GPU off
  autoLabel: true                                  # post-install Job to apply
                                                   # nvidia.com/device-plugin.config=<key>
                                                   # to nodes matching `nodeAssignments`
  # Namespace where NVIDIA GPU Operator's components live. The
  # device-plugin-config ConfigMap is created here (not in cluster.namespace)
  # because GPU Operator's device-plugin DaemonSet only reads ConfigMaps
  # from its own namespace. install-gpu-operator.sh creates this namespace
  # too, but we also create it from the chart so install order is flexible.
  targetNamespace: gpu-operator
  # PodSecurity standard for the gpu-operator namespace. Must be
  # `privileged` for hostPath access to /dev/nvidia*, /run/nvidia/mps, etc.
  # Override only if you've patched gpu-operator to drop hostPath mounts.
  targetNamespacePodSecurity: privileged
  deviceConfigs:
    default:
      version: v1
    rtx4070-mps:
      version: v1
      sharing:
        mps:
          resources:
            - name: nvidia.com/gpu
              replicas: 4
    rtx4080-exclusive:
      version: v1
  nodeAssignments:
    - selector:
        gpu-host-class: rtx4070
      config: rtx4070-mps
    - selector:
        gpu-host-class: rtx4080
      config: rtx4080-exclusive
  # R4 medium-term fix: declarative NFD NodeFeatureRule that re-applies
  # `nvidia.com/device-plugin.config=<key>` on every node based on hardware
  # detection. NFD watches PCI devices and existing labels; the rule
  # converges automatically after node rebuild, k3s reinstall, etc — no
  # CronJob, no one-shot post-install Job needed. GPU Operator already
  # ships NFD so the CRDs (nodefeaturerules.nfd.k8s-sigs.io) are present.
  # The nodeAssignments-based one-shot Job above remains as a fallback for
  # clusters without NFD; both can run side-by-side (NFD wins on conflicts).
  nfdRules:
    enabled: true
    # Each rule maps a (PCI device IDs, optional gpu.product regex) match
    # to a device-plugin config key. Vendor is always NVIDIA (10de); list
    # device IDs under each rule. Ada Lovelace family: RTX 4070=2783,
    # RTX 4070 Ti=2782, RTX 4070 Ti SUPER=2705, RTX 4080=2704,
    # RTX 4080 SUPER=2702. Update for your hardware.
    rules:
      - name: rtx4070-class
        pciDevices: ["2783", "2786", "2705"]
        config: rtx4070-mps
      - name: rtx4080-class
        pciDevices: ["2704", "2702", "2782"]
        config: rtx4080-exclusive

# -- Image-puller DaemonSet (R2 fix) ----------------------------------------
# Pre-pulls the worker image onto every potential worker node so that the
# first scale-up does NOT eat 30–60s on `crictl pull`. The DaemonSet runs
# `pause` (no real workload, cgroup overhead negligible), but kubelet still
# pulls the image listed in `containers[0].image` on each matching node and
# keeps it cached. Subsequent operator scale-ups land on workers that find
# the image already present (`imagePullPolicy: IfNotPresent`).
imagePuller:
  enabled: true
  # Restrict to nodes that can host Slurm workers — by default any node
  # without a NoSchedule taint. Override `nodeSelector` to scope to
  # GPU nodes only when worker images differ between pools.
  nodeSelector: {}
  tolerations: []

# -- Operator (Stage C) ------------------------------------------------------
operator:
  # K1 (v5 review): Guaranteed-QoS resource pinning. Defaults sized for the
  # 1×GPU dev cluster; multi-pool deployments should raise limits.cpu to ≥1
  # and limits.memory to ≥1Gi (operator caches partition state in memory).
  resources:
    requests:
      cpu: "100m"
      memory: "256Mi"
    limits:
      cpu: "500m"
      memory: "512Mi"
  # R21: legacy polling cadence — kept for backwards-compat, used by code
  # paths that still call `time.sleep(poll_interval)` directly. The
  # event-driven loop (default since R21) does not block on this.
  pollIntervalSeconds: 15
  # R21: how often the slurm-diff thread re-runs squeue/sinfo and emits
  # a reconcile event when state changed. 1s is fine on REST-API mode;
  # raise to 5s for very large clusters (>100 pods).
  slurmPollIntervalSeconds: 1
  # R21: safety-net full reconcile if no event arrived. Catches the rare
  # case where every watcher missed an event.
  reconcilePeriodSeconds: 60
  scaleDownCooldownSeconds: 60
  drainTimeoutSeconds: 1800
  checkpointGuard:
    enabled: true
    maxAgeSeconds: 600
    graceSeconds: 300
  # Phase 6 M7: fragmentation detector + requeue decider. Disabled by
  # default; even when enabled, ``shadowMode`` defaults true so the
  # decider runs end-to-end (logs + metrics) without actually requeueing
  # any job. Flip to false only after a release cycle of shadow data
  # confirms the decisions are sane.
  #
  # IMPORTANT — M8 evaluation (2026-05-11, 3 traces × 5 seeds, see
  # docs/eval-writeup.md) found the current victim-selection policy
  # produces a statistically significant mean-JCT regression on all three
  # synthetic workloads (philly +33%, burst +61%, ali +6%, vs the
  # predictor-only baseline). The cost is dominated by lost progress of
  # already-running victims, not by checkpoint reload. Do NOT set
  # shadowMode=false on production traffic until victim selection adds an
  # elapsed-progress penalty or switches to suspend-resume preemption.
  fragmentation:
    enabled: false
    shadowMode: true
    # Cadence for the periodic reconcile thread. Doubles as the decider's
    # min-interval rate limit, so two ticks back-to-back can't both fire
    # a requeue.
    minIntervalSeconds: 60
    # Sliding-window cap on requeue decisions per hour.
    maxRequeuesPerHour: 5
    # Maximum number of low-priority victims requeued in a single decision.
    maxTargetsPerDecision: 4
    # Required priority gap (target.priority - victim.priority) before a
    # running job is eligible for preemption. 0 = any positive gap; bump
    # to e.g. 500 to require a more decisive lead.
    priorityGap: 0
    # MPS slots per node — must match Slurm's gres.conf ``Count=…`` for
    # the ``mps`` GRES. Override per pool when a deployment uses a
    # different slot count.
    mpsPerNode: 100
    # Restrict reconciliation to specific Slurm partitions. Empty list
    # means "all partitions present in PARTITIONS_JSON".
    partitions: []

# -- RL scheduler serve (M11 Phase D) ----------------------------------------
# Optional FastAPI service that holds a trained MaskablePPO policy and
# answers /decide from the lua submit filter (rl_hook.lua → curl /decide).
# Shadow mode by default — logs decision but does not mutate priority.
rlScheduler:
  enabled: false
  image:
    repository: slurm-rl-scheduler
    tag: m11
    pullPolicy: IfNotPresent
  service:
    port: 8002
  resources:
    requests: { cpu: 250m, memory: 512Mi }
    limits:   { cpu: 2,    memory: 2Gi   }
  shadowMode: false       # allow RL-selected jobs to receive priorityBoost
  snapshotTtlSeconds: 30  # /decide abstains if snapshot older than this
  valueAbstain: -1.0      # abstain if policy value head < this
  entropyAbstain: 1.5     # abstain if policy entropy > this
  priorityBoost: 1000     # +X to priority of RL-picked job (shadow when shadowMode)
  networkPolicy:
    enabled: true
  lua:
    enabled: false        # job_submit.lua does NOT call /decide unless true
    url: "http://rl-scheduler:8002/decide"
    timeoutSeconds: 0.15  # curl --max-time

# -- Weight tuner (M9/M10-F) --------------------------------------------------
# UCB1 outer-loop bandit that dynamically tunes (α, δ, ε) score weights.
# Background collector polls slurmrestd every collectorIntervalSeconds and
# feeds mean JCT reward back to the bandit.  Lua pulls /weights at module
# load (once per slurmctld start); wire via slurm.jobSubmit.weightTuner.enabled.
weightTuner:
  enabled: false
  image:
    repository: slurm-weight-tuner
    tag: m9
    pullPolicy: IfNotPresent
  service:
    port: 8003
  resources:
    requests: { cpu: 100m, memory: 128Mi }
    limits:   { cpu: 500m, memory: 256Mi }
  slurmrestdUrl: "http://slurm-restapi.slurm.svc:6820"
  slurmApiVersion: "v0.0.41"
  slurmUser: "root"
  collectorIntervalSeconds: "300"
  minJobsForUpdate: "5"
  ucb1C: "1.0"
  betaFixed: "0.20"
  logLevel: "INFO"
  # Lua side (job_submit.lua pulls /weights on plugin load)
  lua:
    enabled: false
    url: "http://weight-tuner:8003/weights"
    timeoutSeconds: 0.5     # curl --max-time; on failure falls back to chart defaults

# -- Runtime predictor (Phase 6 M5) ------------------------------------------
# Optional FastAPI + LightGBM service that returns predicted runtime to the
# M2 Lua plugin (M6 wires the call). Disabled by default; the lua plugin
# falls back gracefully when the predictor is unreachable (`pcall` + 200ms
# timeout; see docs/scheduler.md).
runtimePredictor:
  enabled: false
  image:
    repository: slurm-runtime-predictor
    tag: m5
    pullPolicy: IfNotPresent
  service:
    port: 8080
  resources:
    requests: { cpu: 100m, memory: 256Mi }
    limits:   { cpu: 1,    memory: 1Gi   }
  # Cold-start fallback floor (seconds). Returned by /predict when the
  # model artifact is missing or n_train < minTrainSamples.
  bootstrapFloorSeconds: 14400
  minTrainSamples: 100
  modelPvc:
    name: runtime-predictor-models
    size: 1Gi
    accessMode: ReadWriteOnce
    # Leave empty to use the default StorageClass (k3s ships local-path).
    storageClassName: ""
  # Weekly retrain CronJob (Sunday 03:00). The job pulls a normalized
  # trace from the shared NFS mount and writes a new model artifact,
  # rotating the previous one to <output>.bak.
  retrain:
    enabled: true
    schedule: "0 3 * * 0"
    suspend: false
    tracePath: /shared/jobs/trace.json
    modelPath: /models/predictor.pkl
    nEstimators: 200
    holdoutFrac: 0.2
    backoffLimit: 1
    activeDeadlineSeconds: 1800
    sharedPvc: ""    # empty ⇒ reuse storage.sharedPvc.name when storage.enabled
  # Allow controller pod → predictor:8080 (and predictor → DNS).
  networkPolicy:
    enabled: true

# -- NetworkPolicy (Stage C) -------------------------------------------------
networkPolicy:
  enabled: true
  apiServerPorts: [443, 6443]                      # both Kind (443) and k3s (6443)

# -- Monitoring add-on (Stage E) ---------------------------------------------
# Enabled in values-k3s.yaml. The monitoring stack (Prometheus / Alertmanager /
# Grafana / kube-state-metrics) lives in its own namespace; slurm-exporter
# lives in cluster.namespace (it talks to slurmrestd over JWT).
#
# Cross-namespace scrape paths are opened automatically by network-policy.yaml
# when both monitoring.enabled and networkPolicy.enabled are true.
monitoring:
  enabled: false
  namespace: monitoring
  prometheus:
    image: prom/prometheus:v2.51.2
    scrapeIntervalSeconds: 15
  alertmanager:
    image: prom/alertmanager:v0.27.0
    # When `slack.webhookUrl` is set, the Alertmanager template wires a
    # slack receiver in place of the default `dev-null`. Leave empty to
    # match the legacy manifest's silent routing.
    slack:
      webhookUrl: ""
      channel: "#slurm-alerts"
  grafana:
    image: grafana/grafana:10.4.2
    adminPassword: admin
  kubeStateMetrics:
    image: registry.k8s.io/kube-state-metrics/kube-state-metrics:v2.12.0
  slurmExporter:
    image: slurm-exporter:latest
    pullPolicy: IfNotPresent
    restUrl: ""                                    # defaults to slurm-restapi.<ns>.svc:6820
    # Pin to v0.0.37 to match Slurm 21.08 (Ubuntu 22.04). When R13 is
    # finally executed (Slurm 23.11+), bump to v0.0.40.
    restApiVersion: v0.0.37
    scrapeIntervalSeconds: 15
  # R5: scrape the GPU Operator's bundled DCGM exporter for true SM% / VRAM /
  # Tensor Core utilisation. The DCGM DaemonSet is enabled by
  # scripts/install-gpu-operator.sh (`--set dcgmExporter.enabled=true`); this
  # block only wires Prometheus to the Service it creates. Disable if running
  # without GPUs.
  dcgmExporter:
    enabled: true
    namespace: gpu-operator
    serviceName: nvidia-dcgm-exporter
    port: 9400
  # Phase 7-A: OpenTelemetry distributed tracing (Tempo + OTel Collector).
  # Set enabled: true to deploy Tempo + otel-collector and wire Grafana datasource.
  otel:
    enabled: false
    collectorImage: "otel/opentelemetry-collector-contrib:0.102.0"
    tempoImage: "grafana/tempo:2.4.2"
    tempoStorage: "5Gi"

# -- Shared storage add-on (Stage E) -----------------------------------------
# Deploys the NFS subdir external provisioner (in its own namespace) and a
# StorageClass + RWX PVC named `slurm-shared-rwx` in cluster.namespace. The
# core Slurm controller/worker StatefulSets do NOT mount this PVC by default
# in the chart yet (parity with manifests/core/slurm-static.yaml requires
# explicit opt-in via a future `slurm.sharedStorage.mount: true` flag — left
# for Stage F so /shared mount stays consistent across both Helm and legacy
# bootstrap paths).
storage:
  enabled: false
  # When true, controller / workers / login mount the shared PVC at /shared.
  # Off by default in `values.yaml` so storage.enabled=true is composable
  # without forcing every Slurm pod to depend on NFS reachability.
  # Override per environment (k3s overlay sets this to true).
  mountInPods: false
  nfsServer: ""                                    # required when enabled=true
  nfsPath: /srv/nfs/k8s
  provisionerNamespace: nfs-provisioner
  storageClassName: slurm-shared-nfs
  # Provisioner identifier baked into the StorageClass + Deployment env. Must
  # match an EXISTING cluster's value when re-installing on top of a legacy
  # bootstrap-storage.sh deploy — provisioner names are immutable on
  # StorageClass, so changing this would force a teardown of all PVs/PVCs.
  provisionerName: k8s-sigs.io/slurm-nfs-subdir-external-provisioner
  sharedPvc:
    name: slurm-shared-rwx
    size: 20Gi
    accessMode: ReadWriteMany
  provisioner:
    image: registry.k8s.io/sig-storage/nfs-subdir-external-provisioner:v4.0.2
    pullPolicy: IfNotPresent

# -- Pre-existing secrets (created by scripts/deploy-1.sh, not by chart)
secrets:
  munge: slurm-munge-key
  jwt: slurm-jwt-secret
  ssh: slurm-ssh-key

# Login pod external SSH access (Phase 7-B).
# Set nodePort to a value > 0 to expose SSH as NodePort (users can then
# connect with: ssh -p <nodePort> root@<k3s-host-ip>).
# Paste one public key per line into authorizedKeys to grant access.
login:
  # K1 (v5 review): bound user-shell blast radius. Comfortable for an
  # interactive session (4 CPU, 8Gi) but stops a fork bomb from taking
  # the node down. Raise for shared multi-user hosts.
  resources:
    requests:
      cpu: "200m"
      memory: "512Mi"
    limits:
      cpu: "4"
      memory: "8Gi"
  ssh:
    nodePort: 30022
    # One public key per line. Example:
    #   authorizedKeys: |
    #     ssh-ed25519 AAAA... user@laptop
    #     ssh-rsa AAAA... user@workstation
    authorizedKeys: ""
