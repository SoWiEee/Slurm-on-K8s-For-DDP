apiVersion: v1
kind: ServiceAccount
metadata:
  name: slurm-elastic-operator
  namespace: slurm
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: slurm-elastic-operator
  namespace: slurm
rules:
  - apiGroups: [""]
    resources: ["pods", "pods/exec"]
    verbs: ["get", "list", "watch", "create"]
  - apiGroups: ["apps"]
    resources: ["statefulsets"]
    verbs: ["get", "list", "watch", "patch", "update"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: slurm-elastic-operator
  namespace: slurm
subjects:
  - kind: ServiceAccount
    name: slurm-elastic-operator
    namespace: slurm
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: slurm-elastic-operator
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: slurm-elastic-operator
  namespace: slurm
spec:
  replicas: 1
  selector:
    matchLabels:
      app: slurm-elastic-operator
  template:
    metadata:
      labels:
        app: slurm-elastic-operator
    spec:
      serviceAccountName: slurm-elastic-operator
      containers:
        - name: operator
          image: slurm-elastic-operator:phase2
          imagePullPolicy: IfNotPresent
          env:
            - name: NAMESPACE
              value: slurm
            - name: CONTROLLER_POD
              value: slurm-controller-0
            - name: SLURM_PARTITION
              value: debug
            - name: WORKER_STATEFULSET
              value: slurm-worker-cpu
            - name: MIN_REPLICAS
              value: "1"
            - name: MAX_REPLICAS
              value: "4"
            - name: SCALE_UP_STEP
              value: "1"
            - name: SCALE_DOWN_STEP
              value: "1"
            - name: POLL_INTERVAL_SECONDS
              value: "15"
            - name: SCALE_DOWN_COOLDOWN_SECONDS
              value: "60"
            - name: CHECKPOINT_GUARD_ENABLED
              value: "true"
            - name: CHECKPOINT_PATH
              value: ""
            - name: MAX_CHECKPOINT_AGE_SECONDS
              value: "600"
