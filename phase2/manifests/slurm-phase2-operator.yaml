apiVersion: v1
kind: ServiceAccount
metadata:
  name: slurm-elastic-operator
  namespace: slurm
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: slurm-elastic-operator
  namespace: slurm
rules:
  - apiGroups: [""]
    resources: ["pods", "pods/exec"]
    verbs: ["get", "list", "watch", "create"]
  - apiGroups: ["apps"]
    resources: ["statefulsets"]
    verbs: ["get", "list", "watch", "patch", "update"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: slurm-elastic-operator
  namespace: slurm
subjects:
  - kind: ServiceAccount
    name: slurm-elastic-operator
    namespace: slurm
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: slurm-elastic-operator
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: slurm-elastic-operator
  namespace: slurm
spec:
  replicas: 1
  selector:
    matchLabels:
      app: slurm-elastic-operator
  template:
    metadata:
      labels:
        app: slurm-elastic-operator
    spec:
      serviceAccountName: slurm-elastic-operator
      containers:
        - name: operator
          image: slurm-elastic-operator:phase2
          imagePullPolicy: IfNotPresent
          env:
            - name: NAMESPACE
              value: slurm
            - name: CONTROLLER_POD
              value: slurm-controller-0
            - name: SLURM_PARTITION
              value: debug
            - name: WORKER_STATEFULSET
              value: slurm-worker-cpu
            - name: PARTITIONS_JSON
              value: >-
                [
                  {"partition":"debug","worker_statefulset":"slurm-worker-cpu","min_replicas":1,"max_replicas":4,"scale_up_step":1,"scale_down_step":1,"scale_down_cooldown":60,"match_features":["cpu"],"fallback":true},
                  {"partition":"debug","worker_statefulset":"slurm-worker-gpu-a10","min_replicas":0,"max_replicas":4,"scale_up_step":1,"scale_down_step":1,"scale_down_cooldown":60,"match_features":["gpu-a10"],"match_gres":["gpu:a10"]},
                  {"partition":"debug","worker_statefulset":"slurm-worker-gpu-h100","min_replicas":0,"max_replicas":4,"scale_up_step":1,"scale_down_step":1,"scale_down_cooldown":60,"match_features":["gpu-h100"],"match_gres":["gpu:h100"]}
                ]
            - name: MIN_REPLICAS
              value: "1"
            - name: MAX_REPLICAS
              value: "4"
            - name: SCALE_UP_STEP
              value: "1"
            - name: SCALE_DOWN_STEP
              value: "1"
            - name: POLL_INTERVAL_SECONDS
              value: "15"
            - name: SCALE_DOWN_COOLDOWN_SECONDS
              value: "60"
            - name: CHECKPOINT_GUARD_ENABLED
              value: "true"
            - name: CHECKPOINT_PATH
              value: ""
            - name: MAX_CHECKPOINT_AGE_SECONDS
              value: "600"
            - name: CHECKPOINT_GRACE_SECONDS
              value: "300"
            - name: SLURM_REST_URL
              value: "http://slurm-restapi.slurm.svc.cluster.local:6820"
            - name: SLURM_REST_API_VERSION
              value: "v0.0.37"
            - name: SLURM_JWT_KEY_PATH
              value: "/slurm-jwt/jwt_hs256.key"
          ports:
            - name: metrics
              containerPort: 8000
              protocol: TCP
          volumeMounts:
            - name: slurm-jwt-secret
              mountPath: /slurm-jwt/jwt_hs256.key
              subPath: jwt_hs256.key
              readOnly: true
          readinessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - test -f /tmp/operator-ready
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - |
                  test -f /tmp/operator-alive &&
                  test $(( $(date +%s) - $(stat -c %Y /tmp/operator-alive) )) -lt 120
            initialDelaySeconds: 60
            periodSeconds: 30
            failureThreshold: 3
      volumes:
        - name: slurm-jwt-secret
          secret:
            secretName: slurm-jwt-secret
---
---
# PDB: keep at least 1 operator pod running during voluntary disruptions.
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: slurm-elastic-operator-pdb
  namespace: slurm
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: slurm-elastic-operator
---
apiVersion: v1
kind: Service
metadata:
  name: slurm-elastic-operator
  namespace: slurm
  labels:
    app: slurm-elastic-operator
spec:
  selector:
    app: slurm-elastic-operator
  ports:
    - name: metrics
      port: 8000
      targetPort: 8000
      protocol: TCP
