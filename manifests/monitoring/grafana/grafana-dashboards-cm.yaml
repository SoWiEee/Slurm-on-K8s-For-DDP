        {
          "id": 10,
          "type": "timeseries",
          "title": "Node Drain & Down State",
          "description": "DRAIN = node is being gracefully removed (no new jobs). DOWN = node is unreachable. Useful for correlating with scale-down events and recovery time.",
          "gridPos": { "x": 12, "y": 20, "w": 12, "h": 8 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "options": {
            "tooltip": { "mode": "multi", "sort": "none" },
            "legend": { "displayMode": "list", "placement": "bottom", "showLegend": true }
          },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
