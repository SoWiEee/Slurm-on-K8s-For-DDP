# Multus NetworkAttachmentDefinition for the DDP data plane (ptp mode, Kind-compatible).
#
# Kind provides the primary management network via kindnet. This adds a single
# secondary NIC for DDP / MPI east-west traffic, avoiding bridge CNI dependency.
# Requires Multus CNI to be installed before applying.
---
apiVersion: k8s.cni.cncf.io/v1
kind: NetworkAttachmentDefinition
metadata:
  name: slurm-data-net
  namespace: slurm
spec:
  config: |
    {
      "cniVersion": "0.3.1",
      "name": "slurm-data-net",
      "type": "ptp",
      "ipMasq": false,
      "ipam": {
        "type": "host-local",
        "subnet": "192.168.20.0/24",
        "rangeStart": "192.168.20.100",
        "rangeEnd": "192.168.20.199"
      }
    }
