# Alternative Multus NAD using bridge CNI instead of ptp.
#
# Use this instead of dual-subnet-nad.yaml if your environment requires bridge mode.
# Requires Multus CNI to be installed before applying.
---
apiVersion: k8s.cni.cncf.io/v1
kind: NetworkAttachmentDefinition
metadata:
  name: slurm-data-net
  namespace: slurm
spec:
  config: |
    {
      "cniVersion": "0.3.1",
      "type": "bridge",
      "bridge": "slurm-data-br",
      "isGateway": true,
      "ipMasq": false,
      "hairpinMode": true,
      "ipam": {
        "type": "host-local",
        "subnet": "192.168.20.0/24",
        "rangeStart": "192.168.20.100",
        "rangeEnd": "192.168.20.199",
        "routes": [{"dst": "192.168.20.0/24"}]
      }
    }
