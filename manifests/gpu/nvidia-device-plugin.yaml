# NVIDIA Kubernetes Device Plugin (v0.17.x)
#
# Exposes real GPUs as nvidia.com/gpu resources to the K8s scheduler.
# Deploy BEFORE running bootstrap.sh with REAL_GPU=true.
#
# Prerequisites (on each GPU node):
#   - NVIDIA driver >= 520 (run: nvidia-smi)
#   - NVIDIA Container Toolkit (run: setup-linux-gpu.sh)
#
# Apply: kubectl apply -f manifests/gpu/nvidia-device-plugin.yaml
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: nvidia-device-plugin-daemonset
  namespace: kube-system
spec:
  selector:
    matchLabels:
      name: nvidia-device-plugin-ds
  updateStrategy:
    type: RollingUpdate
  template:
    metadata:
      labels:
        name: nvidia-device-plugin-ds
    spec:
      tolerations:
        - key: nvidia.com/gpu
          operator: Exists
          effect: NoSchedule
      priorityClassName: system-node-critical
      containers:
        - name: nvidia-device-plugin-ctr
          image: nvcr.io/nvidia/k8s/device-plugin:v0.17.0
          env:
            - name: FAIL_ON_INIT_ERROR
              value: "false"
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: device-plugin
              mountPath: /var/lib/kubelet/device-plugins
      volumes:
        - name: device-plugin
          hostPath:
            path: /var/lib/kubelet/device-plugins
