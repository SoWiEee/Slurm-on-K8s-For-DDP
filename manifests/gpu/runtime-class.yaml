# RuntimeClass for NVIDIA Container Runtime.
#
# k3s 1.27+ auto-detects nvidia-container-runtime in PATH and registers it as
# a containerd runtime named "nvidia". Pods that need GPU access set
# `spec.runtimeClassName: nvidia` to opt in. Without it, pods run under
# the default (runc) runtime and the NVIDIA hook never fires —
# NVIDIA_VISIBLE_DEVICES / NVIDIA_DRIVER_CAPABILITIES are ignored.
apiVersion: node.k8s.io/v1
kind: RuntimeClass
metadata:
  name: nvidia
handler: nvidia
