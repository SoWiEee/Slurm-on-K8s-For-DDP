---
apiVersion: v1
kind: ConfigMap
metadata:
  name: slurm-config
  namespace: slurm
data:
  slurm.conf: |
    ClusterName=kind-slurm
    SlurmctldHost=slurm-controller-0(slurm-controller-0.slurm-controller.slurm.svc.cluster.local)
    MpiDefault=pmi2
    ReturnToService=2
    SlurmctldPidFile=/var/run/slurmctld.pid
    SlurmdPidFile=/var/run/slurmd.pid
    SlurmdSpoolDir=/var/spool/slurmd
    SlurmUser=root
    StateSaveLocation=/var/spool/slurmctld
    SwitchType=switch/none
    TaskPlugin=task/none
    ProctrackType=proctrack/linuxproc
    MailProg=/usr/bin/true
    SelectType=select/cons_tres
    SelectTypeParameters=CR_Core

    SlurmctldPort=6817
    SlurmdPort=6818
    AuthType=auth/munge
    CryptoType=crypto/munge
    AuthAltTypes=auth/jwt
    AuthAltParameters=jwt_key=/slurm-secrets/jwt_hs256.key

    # Job accounting via slurmdbd (gracefully degrades if slurmdbd is unavailable)
    AccountingStorageType=accounting_storage/slurmdbd
    AccountingStorageHost=slurmdbd.slurm.svc.cluster.local
    AccountingStoragePort=6819
    JobAcctGatherType=jobacct_gather/linux
    JobAcctGatherFrequency=30
    GresTypes=gpu,mps
    AccountingStorageTRES=gres/gpu,gres/mps

    NodeName=slurm-worker-cpu-0 NodeAddr=slurm-worker-cpu-0.slurm-worker-cpu.slurm.svc.cluster.local NodeHostname=slurm-worker-cpu-0 CPUs=4 RealMemory=3500 Sockets=1 CoresPerSocket=2 ThreadsPerCore=2 State=UNKNOWN Feature=cpu
    NodeName=slurm-worker-cpu-1 NodeAddr=slurm-worker-cpu-1.slurm-worker-cpu.slurm.svc.cluster.local NodeHostname=slurm-worker-cpu-1 CPUs=4 RealMemory=3500 Sockets=1 CoresPerSocket=2 ThreadsPerCore=2 State=UNKNOWN Feature=cpu
    NodeName=slurm-worker-cpu-2 NodeAddr=slurm-worker-cpu-2.slurm-worker-cpu.slurm.svc.cluster.local NodeHostname=slurm-worker-cpu-2 CPUs=4 RealMemory=3500 Sockets=1 CoresPerSocket=2 ThreadsPerCore=2 State=UNKNOWN Feature=cpu
    NodeName=slurm-worker-cpu-3 NodeAddr=slurm-worker-cpu-3.slurm-worker-cpu.slurm.svc.cluster.local NodeHostname=slurm-worker-cpu-3 CPUs=4 RealMemory=3500 Sockets=1 CoresPerSocket=2 ThreadsPerCore=2 State=UNKNOWN Feature=cpu
    NodeName=slurm-worker-gpu-rtx4070-0 NodeAddr=slurm-worker-gpu-rtx4070-0.slurm-worker-gpu-rtx4070.slurm.svc.cluster.local NodeHostname=slurm-worker-gpu-rtx4070-0 CPUs=4 RealMemory=3500 Sockets=1 CoresPerSocket=2 ThreadsPerCore=2 State=UNKNOWN Feature=gpu,gpu-rtx4070 Gres=gpu:rtx4070:1,mps:100
    NodeName=slurm-worker-gpu-rtx4070-1 NodeAddr=slurm-worker-gpu-rtx4070-1.slurm-worker-gpu-rtx4070.slurm.svc.cluster.local NodeHostname=slurm-worker-gpu-rtx4070-1 CPUs=4 RealMemory=3500 Sockets=1 CoresPerSocket=2 ThreadsPerCore=2 State=UNKNOWN Feature=gpu,gpu-rtx4070 Gres=gpu:rtx4070:1,mps:100
    NodeName=slurm-worker-gpu-rtx4080-0 NodeAddr=slurm-worker-gpu-rtx4080-0.slurm-worker-gpu-rtx4080.slurm.svc.cluster.local NodeHostname=slurm-worker-gpu-rtx4080-0 CPUs=4 RealMemory=3500 Sockets=1 CoresPerSocket=2 ThreadsPerCore=2 State=UNKNOWN Feature=gpu,gpu-rtx4080 Gres=gpu:rtx4080:1
    NodeName=slurm-worker-gpu-rtx4080-1 NodeAddr=slurm-worker-gpu-rtx4080-1.slurm-worker-gpu-rtx4080.slurm.svc.cluster.local NodeHostname=slurm-worker-gpu-rtx4080-1 CPUs=4 RealMemory=3500 Sockets=1 CoresPerSocket=2 ThreadsPerCore=2 State=UNKNOWN Feature=gpu,gpu-rtx4080 Gres=gpu:rtx4080:1
    PartitionName=cpu Nodes=slurm-worker-cpu-0,slurm-worker-cpu-1,slurm-worker-cpu-2,slurm-worker-cpu-3 Default=YES MaxTime=INFINITE State=UP
    PartitionName=gpu-rtx4070 Nodes=slurm-worker-gpu-rtx4070-0,slurm-worker-gpu-rtx4070-1 Default=NO MaxTime=INFINITE State=UP
    PartitionName=gpu-rtx4080 Nodes=slurm-worker-gpu-rtx4080-0,slurm-worker-gpu-rtx4080-1 Default=NO MaxTime=INFINITE State=UP
  gres.conf: |
    NodeName=slurm-worker-gpu-rtx4070-0 Name=gpu Type=rtx4070 Count=1 File=/dev/nvidia0
    NodeName=slurm-worker-gpu-rtx4070-0 Name=mps Count=100
    NodeName=slurm-worker-gpu-rtx4070-1 Name=gpu Type=rtx4070 Count=1 File=/dev/nvidia0
    NodeName=slurm-worker-gpu-rtx4070-1 Name=mps Count=100
    NodeName=slurm-worker-gpu-rtx4080-0 Name=gpu Type=rtx4080 Count=1 File=/dev/nvidia0
    NodeName=slurm-worker-gpu-rtx4080-1 Name=gpu Type=rtx4080 Count=1 File=/dev/nvidia0
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: slurm-controller
  namespace: slurm
spec:
  serviceName: slurm-controller
  replicas: 1
  selector:
    matchLabels:
      app: slurm-controller
  template:
    metadata:
      labels:
        app: slurm-controller
    spec:
      containers:
        - name: slurm-controller
          image: slurm-controller:latest
          imagePullPolicy: IfNotPresent
          command:
            - /bin/bash
            - -lc
            - |
              set -euo pipefail
              MUNGE_SRC=/slurm-secrets/munge.key
              MUNGE_DST=/etc/munge/munge.key
              mkdir -p /etc/munge /run/munge /var/lib/munge /var/log/munge /run/sshd
              chown -R munge:munge /etc/munge /run/munge /var/lib/munge /var/log/munge
              chmod 0700 /etc/munge /var/lib/munge /var/log/munge
              chmod 0711 /run/munge
              install -o munge -g munge -m 0400 "$MUNGE_SRC" "$MUNGE_DST"
              ssh-keygen -A >/dev/null 2>&1 || true
              /usr/sbin/sshd
              su -s /bin/sh -c '/usr/sbin/munged --syslog' munge
              sleep 1
              pgrep -x munged >/dev/null
              # Wait for slurmdbd if accounting is configured, so slurmctld
              # does not fatal-exit on first boot due to missing TRES data.
              if grep -q 'AccountingStorageType=accounting_storage/slurmdbd' /etc/slurm/slurm.conf 2>/dev/null; then
                echo "[controller] waiting for slurmdbd port 6819..."
                until (echo >/dev/tcp/slurmdbd.slurm.svc.cluster.local/6819) 2>/dev/null; do
                  sleep 3
                done
                echo "[controller] slurmdbd is up"
              fi
              exec slurmctld -Dvvv &
              CTLD_PID=$!
              # Wait for slurmctld to be ready before starting slurmrestd.
              # slurmrestd needs SLURM_JWT set (from scontrol token) so that its
              # rest_auth/jwt plugin can bootstrap a valid auth context.
              until scontrol ping >/dev/null 2>&1; do sleep 2; done
              # lifespan=315360000 (10 years) avoids the daemon losing its auth
              # context after the default 24-hour token expiry.
              SLURM_JWT=$(scontrol token username=root lifespan=315360000 | sed 's/SLURM_JWT=//')                 SLURMRESTD_SECURITY=disable_user_check                 /usr/sbin/slurmrestd -a rest_auth/jwt -s openapi/v0.0.37 0.0.0.0:6820 &
              wait $CTLD_PID
          ports:
            - containerPort: 22
            - containerPort: 6817
            - containerPort: 6820
          readinessProbe:
            exec:
              command: ["/bin/sh", "-c", "pgrep -x slurmctld >/dev/null && pgrep -x munged >/dev/null"]
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            exec:
              command: ["/bin/sh", "-c", "pgrep -x slurmctld >/dev/null && pgrep -x slurmrestd >/dev/null"]
            initialDelaySeconds: 60
            periodSeconds: 20
          volumeMounts:
            - name: slurm-config
              mountPath: /etc/slurm
            - name: slurm-secrets
              mountPath: /slurm-secrets
              readOnly: true
            - name: ctld-state
              mountPath: /var/spool/slurmctld
      volumes:
        - name: slurm-config
          configMap:
            name: slurm-config
        - name: slurm-secrets
          projected:
            sources:
              - secret:
                  name: slurm-munge-key
                  items:
                    - key: munge.key
                      path: munge.key
              - secret:
                  name: slurm-ssh-key
                  items:
                    - key: id_ed25519
                      path: id_ed25519
                    - key: id_ed25519.pub
                      path: id_ed25519.pub
              - secret:
                  name: slurm-jwt-secret
                  items:
                    - key: jwt_hs256.key
                      path: jwt_hs256.key
        - name: ctld-state
          persistentVolumeClaim:
            claimName: slurm-ctld-state
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: slurm-controller-pdb
  namespace: slurm
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: slurm-controller
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: slurm-worker-cpu
  namespace: slurm
spec:
  serviceName: slurm-worker-cpu
  replicas: 1
  selector:
    matchLabels:
      app: slurm-worker-cpu
  template:
    metadata:
      labels:
        app: slurm-worker-cpu
        worker-class: cpu-standard
    spec:
      containers:
        - name: slurm-worker
          image: slurm-worker:latest
          imagePullPolicy: IfNotPresent
          command:
            - /bin/bash
            - -lc
            - |
              set -euo pipefail
              MUNGE_SRC=/slurm-secrets/munge.key
              MUNGE_DST=/etc/munge/munge.key
              mkdir -p /etc/munge /run/munge /var/lib/munge /var/log/munge /run/sshd
              chown -R munge:munge /etc/munge /run/munge /var/lib/munge /var/log/munge
              chmod 0700 /etc/munge /var/lib/munge /var/log/munge
              chmod 0711 /run/munge
              install -o munge -g munge -m 0400 "$MUNGE_SRC" "$MUNGE_DST"
              ssh-keygen -A >/dev/null 2>&1 || true
              /usr/sbin/sshd
              su -s /bin/sh -c '/usr/sbin/munged --syslog' munge
              sleep 1
              pgrep -x munged >/dev/null
              exec slurmd -Dvvv -N "$(hostname)"
          ports:
            - containerPort: 22
            - containerPort: 6818
          readinessProbe:
            exec:
              command: ["/bin/sh", "-c", "pgrep -x slurmd >/dev/null && pgrep -x munged >/dev/null"]
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            exec:
              command: ["/bin/sh", "-c", "pgrep -x slurmd >/dev/null"]
            initialDelaySeconds: 20
            periodSeconds: 20
          lifecycle:
            preStop:
              exec:
                command:
                  - /bin/sh
                  - -c
                  - >-
                    scontrol update nodename=$(hostname) state=drain reason=k8s-eviction
                    2>/dev/null || true; sleep 10
          volumeMounts:
            - name: slurm-config
              mountPath: /etc/slurm
            - name: slurm-secrets
              mountPath: /slurm-secrets
              readOnly: true
            - name: modulefile-openmpi
              mountPath: /opt/modulefiles/openmpi
            - name: modulefile-python3
              mountPath: /opt/modulefiles/python3
            - name: modulefile-cuda
              mountPath: /opt/modulefiles/cuda
      volumes:
        - name: slurm-config
          configMap:
            name: slurm-config
        - name: slurm-secrets
          projected:
            sources:
              - secret:
                  name: slurm-munge-key
                  items:
                    - key: munge.key
                      path: munge.key
              - secret:
                  name: slurm-ssh-key
                  items:
                    - key: id_ed25519
                      path: id_ed25519
                    - key: id_ed25519.pub
                      path: id_ed25519.pub
        - name: modulefile-openmpi
          configMap:
            name: slurm-modulefile-openmpi
            optional: true
        - name: modulefile-python3
          configMap:
            name: slurm-modulefile-python3
            optional: true
        - name: modulefile-cuda
          configMap:
            name: slurm-modulefile-cuda
            optional: true
---
