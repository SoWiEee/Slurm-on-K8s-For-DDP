apiVersion: v1
kind: Namespace
metadata:
  name: slurm
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: slurm-ctld-state
  namespace: slurm
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
---
apiVersion: v1
kind: Service
metadata:
  name: slurm-controller
  namespace: slurm
spec:
  clusterIP: None
  publishNotReadyAddresses: true
  selector:
    app: slurm-controller
  ports:
    - name: slurmctld
      port: 6817
      targetPort: 6817
---
apiVersion: v1
kind: Service
metadata:
  name: slurm-restapi
  namespace: slurm
spec:
  selector:
    app: slurm-controller
  ports:
    - name: rest
      port: 6820
      targetPort: 6820
---
apiVersion: v1
kind: Service
metadata:
  name: slurm-worker-cpu
  namespace: slurm
spec:
  clusterIP: None
  publishNotReadyAddresses: true
  selector:
    app: slurm-worker-cpu
  ports:
    - name: slurmd
      port: 6818
      targetPort: 6818
---
apiVersion: v1
kind: Service
metadata:
