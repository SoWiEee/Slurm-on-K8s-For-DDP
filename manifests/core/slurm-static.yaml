apiVersion: apps/v1
kind: Deployment
metadata:
  name: slurm-login
  namespace: slurm
spec:
  replicas: 1
  selector:
    matchLabels:
      app: slurm-login
  template:
    metadata:
      labels:
        app: slurm-login
    spec:
      containers:
        - name: slurm-login
          image: slurm-worker:latest
          imagePullPolicy: IfNotPresent
          command:
            - /bin/bash
            - -lc
            - |
              set -euo pipefail
              MUNGE_SRC=/slurm-secrets/munge.key
              MUNGE_DST=/etc/munge/munge.key
              SSH_SRC_DIR=/slurm-secrets
              if [[ ! -f "$MUNGE_SRC" ]]; then
                echo "[login] missing $MUNGE_SRC" >&2
                exit 1
              fi
              mkdir -p /etc/munge /run/munge /var/lib/munge /var/log/munge /run/sshd
              chown -R munge:munge /etc/munge /run/munge /var/lib/munge /var/log/munge
              chmod 0700 /etc/munge /var/lib/munge /var/log/munge
              chmod 0711 /run/munge
              cp "$MUNGE_SRC" "$MUNGE_DST"
              chown munge:munge "$MUNGE_DST"
              chmod 0400 "$MUNGE_DST"
              install -d -m 0700 /root/.ssh
              if [[ -f "$SSH_SRC_DIR/id_ed25519" ]]; then
                cp "$SSH_SRC_DIR/id_ed25519" /root/.ssh/id_ed25519
                chmod 0600 /root/.ssh/id_ed25519
              fi
              if [[ -f "$SSH_SRC_DIR/id_ed25519.pub" ]]; then
                cp "$SSH_SRC_DIR/id_ed25519.pub" /root/.ssh/id_ed25519.pub
                chmod 0644 /root/.ssh/id_ed25519.pub
                cat /root/.ssh/id_ed25519.pub >> /root/.ssh/authorized_keys
                chmod 0600 /root/.ssh/authorized_keys
              fi
              ssh-keygen -A >/dev/null 2>&1 || true
              if [[ -d /opt/slurm-runtime-src ]]; then
                install -d -m 0755 /opt/slurm-runtime
                cp -f /opt/slurm-runtime-src/* /opt/slurm-runtime/ 2>/dev/null || true
                chmod +x /opt/slurm-runtime/* 2>/dev/null || true
              fi
              if ! su -s /bin/sh -c '/usr/sbin/munged --syslog' munge; then
                echo "[login] munged failed to start" >&2
                exit 1
              fi
              sleep 1
              pgrep -x munged >/dev/null
              /usr/sbin/sshd
              echo "[login] ready: munged+sshd running"
              tail -f /dev/null
          readinessProbe:
            exec:
              command: ["/bin/sh", "-c", "pgrep -x munged >/dev/null"]
            initialDelaySeconds: 5
            periodSeconds: 10
          volumeMounts:
            - name: slurm-config
              mountPath: /etc/slurm
            - name: slurm-secrets
              mountPath: /slurm-secrets
              readOnly: true
            - name: slurm-ddp-runtime
              mountPath: /opt/slurm-runtime-src
              readOnly: true
            - name: modulefile-openmpi
              mountPath: /opt/modulefiles/openmpi
            - name: modulefile-python3
              mountPath: /opt/modulefiles/python3
            - name: modulefile-cuda
              mountPath: /opt/modulefiles/cuda
      volumes:
        - name: slurm-config
          configMap:
            name: slurm-config
        - name: slurm-secrets
          projected:
            sources:
              - secret:
                  name: slurm-munge-key
                  items:
                    - key: munge.key
                      path: munge.key
              - secret:
                  name: slurm-ssh-key
                  items:
                    - key: id_ed25519
                      path: id_ed25519
                    - key: id_ed25519.pub
                      path: id_ed25519.pub
        - name: slurm-ddp-runtime
          configMap:
            name: slurm-ddp-runtime
            defaultMode: 0755
        - name: modulefile-openmpi
          configMap:
            name: slurm-modulefile-openmpi
            optional: true
        - name: modulefile-python3
          configMap:
            name: slurm-modulefile-python3
            optional: true
        - name: modulefile-cuda
          configMap:
            name: slurm-modulefile-cuda
            optional: true
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: slurm-login-pdb
  namespace: slurm
spec:
  maxUnavailable: 1
  selector:
    matchLabels:
      app: slurm-login
---
apiVersion: v1
kind: Service
metadata:
  name: slurm-login
  namespace: slurm
spec:
  selector:
    app: slurm-login
  ports:
    - name: ssh
      port: 22
      targetPort: 22
