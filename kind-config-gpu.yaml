# Kind cluster config for Linux hosts with real NVIDIA GPUs.
#
# Mounts /dev/nvidia* devices and NVIDIA libraries into Kind nodes so
# that the NVIDIA device plugin and GPU worker pods can access the GPU.
# Requires Docker to be configured with the NVIDIA runtime first:
#   sudo bash scripts/setup-linux-gpu.sh --kind
#
# Usage:
#   KIND_CONFIG=kind-config-gpu.yaml bash scripts/bootstrap.sh
---
kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
name: slurm-lab
nodes:
  - role: control-plane
  - role: worker
    # Expose NVIDIA GPU devices from the host into the Kind worker node.
    extraMounts:
      - hostPath: /dev/nvidia0
        containerPath: /dev/nvidia0
      - hostPath: /dev/nvidiactl
        containerPath: /dev/nvidiactl
      - hostPath: /dev/nvidia-uvm
        containerPath: /dev/nvidia-uvm
      - hostPath: /dev/nvidia-uvm-tools
        containerPath: /dev/nvidia-uvm-tools
      # NVIDIA modeset device (present on most driver versions >= 435)
      - hostPath: /dev/nvidia-modeset
        containerPath: /dev/nvidia-modeset
        # Propagation Bidirectional so MPS socket created inside is visible on host
      - hostPath: /tmp/nvidia-mps
        containerPath: /tmp/nvidia-mps
        propagation: Bidirectional
    # Use NVIDIA container runtime so device plugin can allocate GPUs.
    kubeadmConfigPatches:
      - |
        kind: JoinConfiguration
        nodeRegistration:
          criSocket: unix:///run/containerd/containerd.sock
