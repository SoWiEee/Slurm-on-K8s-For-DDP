apiVersion: v1
kind: Namespace
metadata:
  name: slurm
---
apiVersion: v1
kind: Service
metadata:
  name: slurm-nfs
  namespace: slurm
spec:
  selector:
    app: slurm-nfs
  ports:
    - name: nfs
      port: 2049
      targetPort: 2049
    - name: mountd
      port: 20048
      targetPort: 20048
    - name: rpcbind
      port: 111
      targetPort: 111
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: slurm-nfs
  namespace: slurm
spec:
  replicas: 1
  selector:
    matchLabels:
      app: slurm-nfs
  template:
    metadata:
      labels:
        app: slurm-nfs
    spec:
      containers:
        - name: nfs
          image: itsthenetwork/nfs-server-alpine:12
          securityContext:
            privileged: true
          env:
            - name: SHARED_DIRECTORY
              value: /exports
          ports:
            - containerPort: 2049
            - containerPort: 20048
            - containerPort: 111
          volumeMounts:
            - name: export
              mountPath: /exports
      volumes:
        - name: export
          emptyDir: {}
---
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: slurm-shared-nfs
provisioner: nfs.csi.k8s.io
parameters:
  server: slurm-nfs.slurm.svc.cluster.local
  share: /
reclaimPolicy: Delete
volumeBindingMode: Immediate
mountOptions:
  - nfsvers=4.1
allowVolumeExpansion: true
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: slurm-shared-pvc
  namespace: slurm
spec:
  accessModes:
    - ReadWriteMany
  storageClassName: slurm-shared-nfs
  resources:
    requests:
      storage: 20Gi
