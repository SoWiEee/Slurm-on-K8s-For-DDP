---
# Allow Prometheus (in monitoring namespace) to scrape the elastic operator
# metrics endpoint on port 8000. The slurm namespace has a default-deny-ingress
# policy so this explicit rule is required.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-prometheus-scrape-operator
  namespace: slurm
spec:
  podSelector:
    matchLabels:
      app: slurm-elastic-operator
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
      ports:
        - protocol: TCP
          port: 8000
---
# Allow Prometheus (in monitoring namespace) to scrape the slurm-exporter
# metrics endpoint on port 9341.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-prometheus-scrape-exporter
  namespace: slurm
spec:
  podSelector:
    matchLabels:
      app: slurm-exporter
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
      ports:
        - protocol: TCP
          port: 9341
