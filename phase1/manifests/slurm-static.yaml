apiVersion: v1
kind: ConfigMap
metadata:
  name: slurm-config
  namespace: slurm
data:
  slurm.conf: |
    ClusterName=kind-slurm
    SlurmctldHost=slurm-controller-0(slurm-controller-0.slurm-controller.slurm.svc.cluster.local)
    MpiDefault=none
    ProctrackType=proctrack/linuxproc
    ReturnToService=2
    SlurmctldPidFile=/var/run/slurmctld.pid
    SlurmdPidFile=/var/run/slurmd.pid
    SlurmdSpoolDir=/var/spool/slurmd
    SlurmUser=root
    StateSaveLocation=/var/spool/slurmctld
    SwitchType=switch/none
    TaskPlugin=task/none
    SchedulerType=sched/backfill
    MailProg=/usr/bin/true
    SelectType=select/cons_tres
    SelectTypeParameters=CR_Core

    SlurmctldPort=6817
    SlurmdPort=6818
    AuthType=auth/munge
    CryptoType=crypto/munge
    AuthAltTypes=auth/jwt
    AuthAltParameters=jwt_key=/slurm-secrets/jwt_hs256.key
    GresTypes=gpu

    NodeName=slurm-worker-cpu-0 NodeAddr=slurm-worker-cpu-0.slurm-worker-cpu.slurm.svc.cluster.local NodeHostname=slurm-worker-cpu-0 CPUs=4 RealMemory=3500 Sockets=1 CoresPerSocket=2 ThreadsPerCore=2 State=UNKNOWN Feature=cpu
    NodeName=slurm-worker-cpu-1 NodeAddr=slurm-worker-cpu-1.slurm-worker-cpu.slurm.svc.cluster.local NodeHostname=slurm-worker-cpu-1 CPUs=4 RealMemory=3500 Sockets=1 CoresPerSocket=2 ThreadsPerCore=2 State=UNKNOWN Feature=cpu
    NodeName=slurm-worker-cpu-2 NodeAddr=slurm-worker-cpu-2.slurm-worker-cpu.slurm.svc.cluster.local NodeHostname=slurm-worker-cpu-2 CPUs=4 RealMemory=3500 Sockets=1 CoresPerSocket=2 ThreadsPerCore=2 State=UNKNOWN Feature=cpu
    NodeName=slurm-worker-cpu-3 NodeAddr=slurm-worker-cpu-3.slurm-worker-cpu.slurm.svc.cluster.local NodeHostname=slurm-worker-cpu-3 CPUs=4 RealMemory=3500 Sockets=1 CoresPerSocket=2 ThreadsPerCore=2 State=UNKNOWN Feature=cpu
    NodeName=slurm-worker-gpu-a10-0 NodeAddr=slurm-worker-gpu-a10-0.slurm-worker-gpu-a10.slurm.svc.cluster.local NodeHostname=slurm-worker-gpu-a10-0 CPUs=4 RealMemory=3500 Sockets=1 CoresPerSocket=2 ThreadsPerCore=2 State=UNKNOWN Feature=gpu,gpu-a10 Gres=gpu:a10:1
    NodeName=slurm-worker-gpu-a10-1 NodeAddr=slurm-worker-gpu-a10-1.slurm-worker-gpu-a10.slurm.svc.cluster.local NodeHostname=slurm-worker-gpu-a10-1 CPUs=4 RealMemory=3500 Sockets=1 CoresPerSocket=2 ThreadsPerCore=2 State=UNKNOWN Feature=gpu,gpu-a10 Gres=gpu:a10:1
    NodeName=slurm-worker-gpu-a10-2 NodeAddr=slurm-worker-gpu-a10-2.slurm-worker-gpu-a10.slurm.svc.cluster.local NodeHostname=slurm-worker-gpu-a10-2 CPUs=4 RealMemory=3500 Sockets=1 CoresPerSocket=2 ThreadsPerCore=2 State=UNKNOWN Feature=gpu,gpu-a10 Gres=gpu:a10:1
    NodeName=slurm-worker-gpu-a10-3 NodeAddr=slurm-worker-gpu-a10-3.slurm-worker-gpu-a10.slurm.svc.cluster.local NodeHostname=slurm-worker-gpu-a10-3 CPUs=4 RealMemory=3500 Sockets=1 CoresPerSocket=2 ThreadsPerCore=2 State=UNKNOWN Feature=gpu,gpu-a10 Gres=gpu:a10:1
    NodeName=slurm-worker-gpu-h100-0 NodeAddr=slurm-worker-gpu-h100-0.slurm-worker-gpu-h100.slurm.svc.cluster.local NodeHostname=slurm-worker-gpu-h100-0 CPUs=4 RealMemory=3500 Sockets=1 CoresPerSocket=2 ThreadsPerCore=2 State=UNKNOWN Feature=gpu,gpu-h100 Gres=gpu:h100:1
    NodeName=slurm-worker-gpu-h100-1 NodeAddr=slurm-worker-gpu-h100-1.slurm-worker-gpu-h100.slurm.svc.cluster.local NodeHostname=slurm-worker-gpu-h100-1 CPUs=4 RealMemory=3500 Sockets=1 CoresPerSocket=2 ThreadsPerCore=2 State=UNKNOWN Feature=gpu,gpu-h100 Gres=gpu:h100:1
    NodeName=slurm-worker-gpu-h100-2 NodeAddr=slurm-worker-gpu-h100-2.slurm-worker-gpu-h100.slurm.svc.cluster.local NodeHostname=slurm-worker-gpu-h100-2 CPUs=4 RealMemory=3500 Sockets=1 CoresPerSocket=2 ThreadsPerCore=2 State=UNKNOWN Feature=gpu,gpu-h100 Gres=gpu:h100:1
    NodeName=slurm-worker-gpu-h100-3 NodeAddr=slurm-worker-gpu-h100-3.slurm-worker-gpu-h100.slurm.svc.cluster.local NodeHostname=slurm-worker-gpu-h100-3 CPUs=4 RealMemory=3500 Sockets=1 CoresPerSocket=2 ThreadsPerCore=2 State=UNKNOWN Feature=gpu,gpu-h100 Gres=gpu:h100:1
    PartitionName=debug Nodes=slurm-worker-cpu-0,slurm-worker-cpu-1,slurm-worker-cpu-2,slurm-worker-cpu-3,slurm-worker-gpu-a10-0,slurm-worker-gpu-a10-1,slurm-worker-gpu-a10-2,slurm-worker-gpu-a10-3,slurm-worker-gpu-h100-0,slurm-worker-gpu-h100-1,slurm-worker-gpu-h100-2,slurm-worker-gpu-h100-3 Default=YES MaxTime=INFINITE State=UP
  gres.conf: |
    NodeName=slurm-worker-gpu-a10-0 Name=gpu Type=a10 File=/dev/null
    NodeName=slurm-worker-gpu-a10-1 Name=gpu Type=a10 File=/dev/null
