apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: slurm-controller
  namespace: slurm
spec:
  serviceName: slurm-controller
  replicas: 1
  selector:
    matchLabels:
      app: slurm-controller
  template:
    metadata:
      labels:
        app: slurm-controller
    spec:
      containers:
        - name: slurm-controller
          image: slurm-controller:phase1
          imagePullPolicy: IfNotPresent
          command:
            - /bin/bash
            - -lc
            - |
              set -euo pipefail
              MUNGE_SRC=/slurm-secrets/munge.key
              MUNGE_DST=/etc/munge/munge.key
              mkdir -p /etc/munge /run/munge /var/lib/munge /var/log/munge /run/sshd
              chown -R munge:munge /etc/munge /run/munge /var/lib/munge /var/log/munge
              chmod 0700 /etc/munge /var/lib/munge /var/log/munge
              chmod 0711 /run/munge
              install -o munge -g munge -m 0400 "$MUNGE_SRC" "$MUNGE_DST"
              ssh-keygen -A >/dev/null 2>&1 || true
              /usr/sbin/sshd
              su -s /bin/sh -c '/usr/sbin/munged --syslog' munge
              sleep 1
              pgrep -x munged >/dev/null
              exec slurmctld -Dvvv &
              CTLD_PID=$!
              # Wait for slurmctld to be ready before starting slurmrestd.
              # slurmrestd needs SLURM_JWT set (from scontrol token) so that its
              # rest_auth/jwt plugin can bootstrap a valid auth context.
              until scontrol ping >/dev/null 2>&1; do sleep 2; done
              # lifespan=315360000 (10 years) avoids the daemon losing its auth
              # context after the default 24-hour token expiry.
              SLURM_JWT=$(scontrol token username=root lifespan=315360000 | sed 's/SLURM_JWT=//')                 SLURMRESTD_SECURITY=disable_user_check                 /usr/sbin/slurmrestd -a rest_auth/jwt -s openapi/v0.0.37 0.0.0.0:6820 &
              wait $CTLD_PID
          ports:
            - containerPort: 22
            - containerPort: 6817
            - containerPort: 6820
          readinessProbe:
            exec:
              command: ["/bin/sh", "-c", "pgrep -x slurmctld >/dev/null && pgrep -x munged >/dev/null"]
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            exec:
              command: ["/bin/sh", "-c", "pgrep -x slurmctld >/dev/null && pgrep -x slurmrestd >/dev/null"]
            initialDelaySeconds: 60
            periodSeconds: 20
          volumeMounts:
            - name: slurm-config
              mountPath: /etc/slurm
            - name: slurm-secrets
              mountPath: /slurm-secrets
              readOnly: true
            - name: shared-storage
              mountPath: /shared
      volumes:
        - name: slurm-config
          configMap:
            name: slurm-config
        - name: slurm-secrets
          projected:
            sources:
              - secret:
                  name: slurm-munge-key
                  items:
                    - key: munge.key
                      path: munge.key
              - secret:
                  name: slurm-ssh-key
                  items:
                    - key: id_ed25519
                      path: id_ed25519
                    - key: id_ed25519.pub
                      path: id_ed25519.pub
              - secret:
                  name: slurm-jwt-secret
                  items:
                    - key: jwt_hs256.key
                      path: jwt_hs256.key
        - name: shared-storage
          persistentVolumeClaim:
            claimName: slurm-shared-rwx
---
