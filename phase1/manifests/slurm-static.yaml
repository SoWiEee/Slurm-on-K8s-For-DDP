apiVersion: v1
kind: Namespace
metadata:
  name: slurm
---
apiVersion: v1
kind: Service
metadata:
  name: slurm-controller
  namespace: slurm
spec:
  clusterIP: None
  publishNotReadyAddresses: true
  selector:
    app: slurm-controller
  ports:
    - name: slurmctld
      port: 6817
      targetPort: 6817
---
apiVersion: v1
kind: Service
metadata:
  name: slurm-restapi
  namespace: slurm
spec:
  selector:
    app: slurm-controller
  ports:
    - name: rest
      port: 6820
      targetPort: 6820
---
