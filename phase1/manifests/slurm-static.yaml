apiVersion: v1
kind: Namespace
metadata:
  name: slurm
---
apiVersion: v1
kind: Service
metadata:
  name: slurm-controller
  namespace: slurm
spec:
  clusterIP: None
  publishNotReadyAddresses: true
  selector:
    app: slurm-controller
  ports:
    - name: slurmctld
      port: 6817
      targetPort: 6817
---
apiVersion: v1
kind: Service
metadata:
  name: slurm-worker
  namespace: slurm
spec:
  clusterIP: None
  publishNotReadyAddresses: true
  selector:
    app: slurm-worker
  ports:
    - name: slurmd
      port: 6818
      targetPort: 6818
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: slurm-config
  namespace: slurm
data:
  slurm.conf: |
    ClusterName=kind-slurm
    SlurmctldHost=slurm-controller-0(slurm-controller-0.slurm-controller.slurm.svc.cluster.local)
    MpiDefault=none
    ProctrackType=proctrack/linuxproc
    ReturnToService=2
    SlurmctldPidFile=/var/run/slurmctld.pid
    SlurmdPidFile=/var/run/slurmd.pid
    SlurmdSpoolDir=/var/spool/slurmd
    SlurmUser=root
    StateSaveLocation=/var/spool/slurmctld
    SwitchType=switch/none
    TaskPlugin=task/none
    SchedulerType=sched/backfill
    MailProg=/usr/bin/true
    SelectType=select/cons_tres
    SelectTypeParameters=CR_Core

    SlurmctldPort=6817
    SlurmdPort=6818
    AuthType=auth/munge
    CryptoType=crypto/munge

    NodeName=slurm-worker-0 NodeAddr=slurm-worker-0.slurm-worker.slurm.svc.cluster.local NodeHostname=slurm-worker-0 CPUs=4 RealMemory=3500 Sockets=1 CoresPerSocket=2 ThreadsPerCore=2 State=UNKNOWN
    NodeName=slurm-worker-1 NodeAddr=slurm-worker-1.slurm-worker.slurm.svc.cluster.local NodeHostname=slurm-worker-1 CPUs=4 RealMemory=3500 Sockets=1 CoresPerSocket=2 ThreadsPerCore=2 State=UNKNOWN
    NodeName=slurm-worker-2 NodeAddr=slurm-worker-2.slurm-worker.slurm.svc.cluster.local NodeHostname=slurm-worker-2 CPUs=4 RealMemory=3500 Sockets=1 CoresPerSocket=2 ThreadsPerCore=2 State=UNKNOWN
    NodeName=slurm-worker-3 NodeAddr=slurm-worker-3.slurm-worker.slurm.svc.cluster.local NodeHostname=slurm-worker-3 CPUs=4 RealMemory=3500 Sockets=1 CoresPerSocket=2 ThreadsPerCore=2 State=UNKNOWN
    PartitionName=debug Nodes=slurm-worker-[0-3] Default=YES MaxTime=INFINITE State=UP
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: slurm-controller
  namespace: slurm
spec:
  serviceName: slurm-controller
  replicas: 1
  selector:
    matchLabels:
      app: slurm-controller
  template:
    metadata:
      labels:
        app: slurm-controller
    spec:
      containers:
        - name: slurm-controller
          image: slurm-controller:phase1
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 22
            - containerPort: 6817
          readinessProbe:
            exec:
              command: ["/bin/sh", "-c", "pgrep -x slurmctld >/dev/null && pgrep -x munged >/dev/null"]
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            exec:
              command: ["/bin/sh", "-c", "pgrep -x slurmctld >/dev/null"]
            initialDelaySeconds: 20
            periodSeconds: 20
          volumeMounts:
            - name: slurm-config
              mountPath: /etc/slurm
            - name: slurm-secrets
              mountPath: /slurm-secrets
              readOnly: true
      volumes:
        - name: slurm-config
          configMap:
            name: slurm-config
        - name: slurm-secrets
          projected:
            sources:
              - secret:
                  name: slurm-munge-key
                  items:
                    - key: munge.key
                      path: munge.key
              - secret:
                  name: slurm-ssh-key
                  items:
                    - key: id_ed25519
                      path: id_ed25519
                    - key: id_ed25519.pub
                      path: id_ed25519.pub
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: slurm-worker
  namespace: slurm
spec:
  serviceName: slurm-worker
  replicas: 1
  selector:
    matchLabels:
      app: slurm-worker
  template:
    metadata:
      labels:
        app: slurm-worker
    spec:
      containers:
        - name: slurm-worker
          image: slurm-worker:phase1
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 22
            - containerPort: 6818
          readinessProbe:
            exec:
              command: ["/bin/sh", "-c", "pgrep -x slurmd >/dev/null && pgrep -x munged >/dev/null"]
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            exec:
              command: ["/bin/sh", "-c", "pgrep -x slurmd >/dev/null"]
            initialDelaySeconds: 20
            periodSeconds: 20
          volumeMounts:
            - name: slurm-config
              mountPath: /etc/slurm
            - name: slurm-secrets
              mountPath: /slurm-secrets
              readOnly: true
      volumes:
        - name: slurm-config
          configMap:
            name: slurm-config
        - name: slurm-secrets
          projected:
            sources:
              - secret:
                  name: slurm-munge-key
                  items:
                    - key: munge.key
                      path: munge.key
              - secret:
                  name: slurm-ssh-key
                  items:
                    - key: id_ed25519
                      path: id_ed25519
                    - key: id_ed25519.pub
                      path: id_ed25519.pub
